<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script>
  /* La sesión de Google debe existir antes de que arranque la primera consulta
     del board. Se consume una sola vez y se limpia de la barra de dirección. */
  (function(){
    try{
      var q=new URLSearchParams(location.search),s=q.get('sesion');
      if(!s)return;
      window.__PYOD_BOOT=s;localStorage.setItem('pyod_clave_v1',s);sessionStorage.removeItem('pyod_rol');
      q.delete('sesion');history.replaceState(null,'',location.pathname+(q.toString()?'?'+q:'')+location.hash);
    }catch(e){}
  })();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Tablero · Yo Desarrollo</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231a1818'/%3E%3Ctext x='50' y='70' font-family='Georgia' font-size='58' font-weight='bold' fill='%23ffffff' text-anchor='middle'%3EY%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* Identidad yodesarrollo.mx: Kefa (firma) + Poppins/Raleway, blanco/negro + acento vino #1a1818 (teal/índigo menores) */
  @font-face{font-family:'Kefa-Regular';src:local('Kefa'),url('fonts/Kefa-Regular.ttf') format('truetype');font-display:swap;}
  /* Acento = NEGRO (como los bloques/botones de yodesarrollo.mx). Blanco + gris claro. Verde/rojo SOLO como señal de dato, mínimos. */
  :root{--negro:#F1EDE3;--oro:#B98B3C;--crema:#17140F;--arena:#221E17;--piedra:#8A8272;--carbon:#B5AC99;--linea:rgba(255,255,255,.09);
    --verde:#8FBF8B;--amar:#D9A45B;--rojo:#E0605A;--tinta:#F1EDE3;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px) 0 0/60px 60px,linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px) 0 0/60px 60px,#17140F;color:var(--negro);font-family:'Instrument Sans','Manrope','Helvetica Neue',Arial,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased;}
  .serif{font-family:Instrument Serif,Georgia,serif;}
  header{background:#121215;border-bottom:1px solid var(--linea);padding:13px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:50;}
  .logo{display:flex;align-items:center;gap:11px;text-decoration:none;}
  .logo-img{height:28px;width:auto;display:block;filter:brightness(0) invert(.92);}
  .logo .sub{color:var(--piedra);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;border-left:1px solid var(--linea);padding-left:11px;}
  .hctrl{display:flex;align-items:center;gap:10px;}
  #badge{display:flex;align-items:center;gap:6px;font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--carbon);border:1px solid var(--linea);border-radius:20px;padding:5px 11px;cursor:pointer;background:transparent;font-family:inherit;}
  #badge .dot{width:7px;height:7px;border-radius:50%;background:#888;}
  #badge[data-s="live"] .dot{background:var(--verde);} #badge[data-s="live"]{color:var(--verde);}
  #badge[data-s="partial"] .dot{background:var(--amar);} #badge[data-s="partial"]{color:var(--amar);}
  #badge[data-s="cache"] .dot{background:var(--amar);} #badge[data-s="error"] .dot{background:var(--rojo);}
  #badge[data-s="loading"] .dot{background:var(--oro);animation:pulse 1s infinite;}
  @keyframes pulse{50%{opacity:.3;}}
  main{max-width:1080px;margin:0 auto;padding:22px 18px 90px;}
  h2.sec{font-family:Instrument Serif,Georgia,serif;font-weight:normal;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--piedra);margin:26px 0 12px;}
  /* semaforo */
  .semaforo{border-radius:6px;padding:17px 22px;color:#F1EDE3;margin-bottom:8px;background:#16161a;border-left:5px solid var(--piedra);}
  .semaforo.verde{border-left-color:var(--verde);} .semaforo.amar{border-left-color:var(--amar);} .semaforo.rojo{border-left-color:var(--rojo);} .semaforo.gris{border-left-color:var(--carbon);}
  .semaforo .lbl{color:#B5AC99;}
  .semaforo .lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:.85;}
  .semaforo .msg{font-family:Instrument Serif,Georgia,serif;font-size:clamp(18px,3vw,24px);margin-top:4px;line-height:1.3;}
  /* numerotes */
  .nums{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
  .num{background:#16161a;border:1px solid var(--linea);border-radius:6px;padding:16px 18px;}
  .num .k{font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--piedra);}
  .num .v{font-family:Instrument Serif,Georgia,serif;font-size:clamp(26px,4vw,34px);color:var(--negro);margin-top:3px;line-height:1.05;}
  .num .v small{font-size:13px;color:var(--piedra);}
  .num .d{font-size:11px;margin-top:3px;} .num .d.up{color:var(--verde);} .num .d.down{color:var(--rojo);} .num .d.flat{color:var(--piedra);}
  .num.star{border-color:var(--oro);box-shadow:0 0 0 1px var(--oro);}
  /* funnel */
  .funnel{display:flex;gap:8px;flex-wrap:wrap;}
  .fstep{flex:1;min-width:120px;background:#16161a;border:1px solid var(--linea);border-radius:6px;padding:14px 16px;position:relative;}
  .fstep .fn{font-family:Instrument Serif,Georgia,serif;font-size:30px;color:var(--oro);}
  .fstep .fl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--piedra);}
  .fstep .fr{font-size:11px;color:var(--carbon);margin-top:2px;}
  /* tablas */
  table{width:100%;border-collapse:collapse;background:#16161a;border:1px solid var(--linea);border-radius:6px;overflow:hidden;font-size:13px;}
  th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--linea);}
  th{font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--piedra);background:var(--arena);}
  td.r,th.r{text-align:right;font-family:Instrument Serif,Georgia,serif;}
  tr:last-child td{border-bottom:none;}
  /* barras por dia */
  .bars{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .bar{background:#16161a;border:1px solid var(--linea);border-radius:5px;padding:8px 4px;text-align:center;}
  .bar .bd{font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:var(--piedra);}
  .bar .bn{font-family:Instrument Serif,Georgia,serif;font-size:18px;color:var(--negro);margin-top:2px;}
  .bar .bc{font-size:9.5px;color:var(--oro);}
  /* alertas */
  .alert{display:flex;align-items:center;gap:9px;background:#16161a;border:1px solid var(--linea);border-left-width:4px;border-radius:5px;padding:10px 14px;margin-bottom:7px;font-size:13px;}
  .alert.verde{border-left-color:var(--verde);} .alert.amar{border-left-color:var(--amar);} .alert.rojo{border-left-color:var(--rojo);}
  .alert .ai{font-size:15px;}
  /* gasto form */
  .card{background:#16161a;border:1px solid var(--linea);border-radius:6px;padding:18px;}
  .card p.h{font-family:Instrument Serif,Georgia,serif;font-size:16px;margin-bottom:4px;}
  .card p.s{font-size:12px;color:var(--piedra);margin-bottom:14px;}
  .frow{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
  .fld{flex:1;min-width:130px;} .fld label{display:block;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--piedra);margin-bottom:4px;}
  .fld input,.fld textarea{width:100%;padding:10px 12px;border:1px solid var(--linea);border-radius:5px;font-size:14px;font-family:inherit;background:var(--crema);color:var(--negro);}
  .fld textarea{min-height:64px;resize:vertical;}
  .btn{background:var(--oro);color:#17140F;border:none;border-radius:5px;padding:11px 22px;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;cursor:pointer;}
  .btn:hover{background:#e0c590;} .btn:disabled{opacity:.5;cursor:default;}
  .hint{font-size:11px;color:var(--piedra);margin-top:8px;line-height:1.5;}
  .hint code{background:var(--arena);padding:1px 5px;border-radius:3px;font-size:11px;}
  .nota{font-size:12px;color:var(--piedra);font-style:italic;line-height:1.5;}
  .link-meta{display:inline-block;margin-top:6px;color:var(--oro);font-size:13px;text-decoration:none;border-bottom:1px solid var(--oro);}
  #toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#F1EDE3;color:#17140F;padding:12px 20px;border-radius:6px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:90;max-width:90%;}
  #toast.on{opacity:1;} #toast.warn{background:var(--rojo);color:#17140F;}
  .muted{color:var(--piedra);font-size:12px;}
  .embrow{cursor:pointer;border-radius:6px;transition:background .12s;} .embrow:hover{background:var(--arena);}
  /* galeria de publicaciones */
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;grid-auto-rows:1fr;}
  .pcard{background:#16161a;border:1px solid var(--linea);border-radius:8px;overflow:hidden;cursor:pointer;transition:transform .12s,box-shadow .12s;position:relative;display:flex;flex-direction:column;height:100%;}
  .pcard:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.45);border-color:var(--oro);}
  .pcard .cov{width:100%;aspect-ratio:4/5;object-fit:cover;display:block;background:var(--arena);}
  .pcard .ph{padding:8px 10px;flex:1;display:flex;flex-direction:column;}
  .pcard .pt{font-size:11px;color:var(--carbon);display:flex;justify-content:space-between;align-items:center;}
  .pcard .pmain{font-family:Instrument Serif,Georgia,serif;font-size:17px;color:var(--negro);margin-top:2px;}
  .pcard .pmain small{font-size:11px;color:var(--piedra);font-family:inherit;}
  .pbadge{position:absolute;top:8px;left:8px;background:var(--oro);color:#17140F;font-size:9px;font-weight:700;letter-spacing:1px;padding:3px 7px;border-radius:20px;text-transform:uppercase;}
  .pnet{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;font-family:Instrument Serif,Georgia,serif;}
  .pnet.ig{background:var(--oro);color:#17140F;} .pnet.fb{background:#3a3a40;}
  .pcov-ph{width:100%;aspect-ratio:4/5;display:flex;align-items:center;justify-content:center;text-align:center;padding:10px;background:linear-gradient(135deg,var(--arena),#2b2b31);color:var(--carbon);font-size:11px;line-height:1.35;}
  /* ficha modal */
  .pov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:80;display:flex;align-items:flex-start;justify-content:center;padding:24px 14px;overflow-y:auto;}
  .pficha{background:#121215;border-radius:10px;max-width:560px;width:100%;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .pfhead{display:flex;gap:14px;padding:16px;background:#16161a;border-bottom:1px solid var(--linea);align-items:flex-start;}
  .pfhead img{width:96px;height:120px;border-radius:6px;flex:none;object-fit:cover;background:var(--arena);}
  .pfhead .pcov-ph{width:96px;height:120px;border-radius:6px;flex:none;aspect-ratio:auto;}
  .pfhead .pfx{flex:1;min-width:0;}
  .pfx .pftipo{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--piedra);}
  .pfx .pftit{font-family:Instrument Serif,Georgia,serif;font-size:15px;margin:3px 0;line-height:1.3;}
  .pfclose{cursor:pointer;font-size:22px;color:var(--piedra);background:none;border:none;line-height:1;padding:0 2px;flex:none;}
  .fmgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--linea);}
  .fm{background:#16161a;padding:11px 12px;}
  .fm .fk{font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--piedra);}
  .fm .fv{font-family:Instrument Serif,Georgia,serif;font-size:22px;color:var(--negro);line-height:1.1;margin-top:2px;}
  .fm .fv small{font-size:11px;color:var(--piedra);}
  .fm .fsub{font-size:10px;color:var(--oro);margin-top:2px;line-height:1.2;}
  .fm.nd .fv{color:var(--piedra);font-size:15px;}
  .pfrow{padding:11px 16px;border-top:1px solid var(--linea);font-size:12px;color:var(--carbon);}
  .pfrow b{color:var(--negro);}
  .spark{display:block;margin-top:6px;}
  /* franja de decisión + hueco del lead */
  .decision{background:linear-gradient(135deg,#16161a,#1b1b20);border:1px solid var(--oro);border-left:4px solid var(--oro);border-radius:8px;padding:14px 18px;margin-bottom:10px;}
  .decision .dl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--piedra);}
  .decision .dm{font-family:Instrument Serif,Georgia,serif;font-size:clamp(15px,2.2vw,19px);color:var(--negro);margin-top:3px;line-height:1.4;}
  .decision .dm b{color:#B98B3C;}
  .leadgap{display:flex;gap:11px;align-items:flex-start;background:rgba(224,96,90,.14);border:1px solid var(--rojo);border-left:4px solid var(--rojo);border-radius:8px;padding:12px 16px;margin-bottom:14px;}
  .leadgap .li{font-size:18px;line-height:1.2;flex:none;}
  .leadgap .lt{font-size:13px;color:#e6c1be;line-height:1.45;}
  .leadgap .lt b{color:var(--rojo);}
  /* KPIs de referencia (de-enfatizados) */
  .kref{display:flex;flex-wrap:wrap;gap:5px 16px;font-size:12.5px;color:var(--piedra);margin-bottom:13px;padding:9px 13px;background:#16161a;border:1px solid var(--linea);border-radius:6px;align-items:center;}
  .kref .kt{font-size:9.5px;letter-spacing:1px;text-transform:uppercase;}
  .kref b{font-family:Instrument Serif,Georgia,serif;color:var(--carbon);font-weight:normal;}
  /* controles de orden/filtro */
  .pfilters{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:13px;}
  .pfilters .pfl{font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--piedra);}
  .chipbtn{font-size:12.5px;border:1px solid var(--linea);background:#16161a;color:var(--carbon);border-radius:20px;padding:6px 13px;cursor:pointer;}
  .chipbtn.on{background:var(--oro);color:#17140F;border-color:var(--oro);}
  /* tarjeta: ángulo + affordance + legibilidad */
  .pcard .pt{font-size:12px;}
  .pcard .pmain{font-size:17px;margin-top:3px;}
  .pcard .pmain b{font-family:Instrument Serif,Georgia,serif;} .pcard .pmain small{font-size:11px;color:var(--piedra);}
  .pfoot{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:6px;gap:6px;}
  /* chips de métricas: icono + número, MISMO peso (todo lo de IG/FB, sin héroe) */
  .chips{display:flex;flex-wrap:wrap;gap:4px 10px;margin-top:6px;}
  .chips.ficha{gap:9px 16px;padding:13px 16px 4px;}
  .chip{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--carbon);white-space:nowrap;line-height:1.6;}
  .chip .cic{font-size:11.5px;opacity:.9;}
  .chip .cv{font-weight:600;color:var(--negro);font-variant-numeric:tabular-nums;}
  .chip .cl{color:var(--piedra);font-size:11px;}
  .chip.nd{opacity:.6;} .chip.nd .cv{color:var(--piedra);font-weight:400;}
  .pang{font-size:10px;color:#B98B3C;background:rgba(185,139,60,.14);border-radius:20px;padding:2px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pgo{font-size:11px;color:#B98B3C;font-weight:600;flex:none;}
  .pmore{display:inline-block;margin-top:12px;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#B98B3C;border:1px solid var(--oro);border-radius:20px;padding:8px 16px;cursor:pointer;background:#16161a;}
  .pcount{font-size:11.5px;color:var(--piedra);margin:10px 0 2px;}
  /* ficha: hero + bloques + tiles legibles */
  .pfhead img{width:128px;height:160px;}
  .pfx .pftit{font-size:14px;}
  .fblock{font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--piedra);background:var(--arena);padding:7px 16px;}
  .fm .fk{font-size:10px;}
  .fm.gap{background:rgba(224,96,90,.14);} .fm.gap .fv{color:var(--rojo);font-size:15px;} .fm.gap .fsub{color:var(--rojo);}
  .pfclose{font-size:24px;min-width:40px;min-height:40px;}
  /* --- mejoras jul-11: nav de secciones, acciones, estados de lead, caja-herramienta --- */
  html{scroll-behavior:smooth;} h2.sec{scroll-margin-top:130px;}
  .secnav{display:flex;gap:6px;overflow-x:auto;padding:10px 0;margin:2px 0 4px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .secnav::-webkit-scrollbar{display:none;}
  @media(min-width:700px){.secnav{position:sticky;top:55px;z-index:40;background:linear-gradient(#17140F 78%,rgba(10,10,12,0));}}
  .secnav a{flex:none;font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--carbon);border:1px solid var(--linea);background:#16161a;border-radius:20px;padding:6px 13px;text-decoration:none;}
  .secnav a:hover{border-color:var(--oro);color:var(--oro);}
  .num .sub{font-size:10.5px;margin-top:3px;color:var(--piedra);line-height:1.35;}
  .accion{display:flex;gap:11px;align-items:flex-start;background:#16161a;border:1px solid var(--linea);border-left:4px solid var(--oro);border-radius:6px;padding:12px 15px;margin-bottom:7px;font-size:13.5px;line-height:1.5;color:var(--carbon);}
  .accion b{color:var(--negro);} .accion a{color:var(--oro);}
  .accion .an{font-family:Instrument Serif,Georgia,serif;color:var(--oro);font-size:19px;line-height:1.1;min-width:15px;}
  .accion.rojo{border-left-color:var(--rojo);} .accion.rojo .an{color:var(--rojo);}
  .est{display:inline-block;font-size:9.5px;letter-spacing:.8px;text-transform:uppercase;border-radius:20px;padding:2px 9px;border:1px solid var(--linea);color:var(--carbon);white-space:nowrap;}
  .est.nuevo{color:#17140F;background:var(--amar);border-color:var(--amar);}
  .est.agendada{color:#17140F;background:var(--verde);border-color:var(--verde);}
  .est.cliente{color:#17140F;background:var(--oro);border-color:var(--oro);}
  .est.descartado{opacity:.5;}
  .magchip{font-size:9px;letter-spacing:.6px;text-transform:uppercase;color:var(--piedra);border:1px solid var(--linea);border-radius:4px;padding:2px 6px;white-space:nowrap;}
  .toolbox{background:linear-gradient(135deg,#16161a,#1b1b20);border:1px solid rgba(185,139,60,.35);border-left:4px solid rgba(185,139,60,.55);border-radius:8px;padding:13px 16px;margin-bottom:14px;}
  .toolbox .tt{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--oro);margin-bottom:4px;}
  .toolbox .tx{font-size:13px;color:var(--carbon);line-height:1.5;display:block;}
  .toolbox b{color:var(--negro);}
  /* --- review Chris Do + UX (jul-11): estados, presupuesto de oro, dinámica --- */
  :root{--oro-tenue:rgba(185,139,60,.4);}
  /* presupuesto de acento: links y controles secundarios dejan el oro sólido */
  .link-meta{color:var(--carbon);border-bottom:1px solid var(--linea);}
  .link-meta:hover{color:var(--oro);border-bottom-color:var(--oro-tenue);}
  .chipbtn.on{background:transparent;color:var(--oro);border-color:var(--oro);}
  .pgo{color:var(--carbon);} .pmore{color:var(--carbon);border-color:var(--linea);}
  .pang{color:var(--carbon);background:rgba(255,255,255,.05);}
  /* semáforo por tarjeta: el ESTADO decide el énfasis */
  .num{border-left:3px solid transparent;}
  .num.ok{border-left-color:var(--verde);} .num.warn{border-left-color:var(--amar);}
  .num.urgente{border-left:3px solid var(--rojo);border-color:var(--rojo);box-shadow:0 0 0 1px rgba(224,96,90,.35),0 0 22px rgba(224,96,90,.12);}
  .num.urgente .v{font-size:clamp(34px,5.2vw,46px);color:var(--rojo);}
  .num .cta{display:inline-block;margin-top:6px;font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--rojo);border:1px solid var(--rojo);border-radius:20px;padding:4px 11px;text-decoration:none;}
  /* embudo de negocio con forma (barras proporcionales) */
  .bfrow{display:grid;grid-template-columns:88px 1fr 120px;align-items:center;gap:8px;margin-bottom:6px;}
  .bfrow .bfl{font-size:11.5px;color:var(--carbon);text-align:right;}
  .bfrow .bfn{font-size:11px;color:var(--piedra);}
  .bfrow .bfn b{font-family:Instrument Serif,Georgia,serif;font-size:15px;color:var(--negro);font-weight:normal;}
  .cuello{font-family:Instrument Serif,Georgia,serif;font-size:clamp(14px,2.2vw,17px);color:var(--negro);margin-top:9px;}
  .cuello b{color:var(--rojo);}
  /* detalles colapsables (metodología fuera de la vista) */
  details.como{margin:8px 0 4px;} details.como summary{cursor:pointer;font-size:11px;color:var(--piedra);letter-spacing:.5px;list-style:none;display:inline-block;border:1px solid var(--linea);border-radius:20px;padding:5px 12px;}
  details.como summary::-webkit-details-marker{display:none;}
  details.como[open] summary{color:var(--carbon);border-color:var(--carbon);}
  details.como .cuerpo{margin-top:8px;padding:10px 14px;background:#101013;border:1px solid var(--linea);border-radius:6px;}
  /* leyenda de días tocable */
  .diachips{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin:6px 0 8px;}
  .diachips button{border:none;border-radius:5px;padding:5px 9px;font-size:10.5px;color:#17140F;cursor:pointer;font-weight:600;min-height:30px;}
  /* animaciones (respetando reduced-motion) */
  @media(prefers-reduced-motion:no-preference){
    .grow{transform:scaleX(0);transform-origin:left;}
    .grow.in{transform:scaleX(1);transition:transform .55s cubic-bezier(.22,1,.36,1);transition-delay:calc(var(--i,0)*60ms);}
    .spark polyline{stroke-dasharray:600;stroke-dashoffset:600;}
    .spark.in polyline{stroke-dashoffset:0;transition:stroke-dashoffset .8s ease .25s;}
    @keyframes flashoro{0%{color:var(--oro);}100%{color:inherit;}}
    .flash{animation:flashoro .9s ease-out;}
    .ringp{transition:stroke-dashoffset .8s cubic-bezier(.22,1,.36,1) .3s;}
  }
  /* tooltip táctil propio (title= no existe en móvil) */
  #tip{position:fixed;z-index:95;background:#F1EDE3;color:#17140F;font-size:12px;line-height:1.4;padding:8px 11px;border-radius:6px;max-width:240px;pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:0 6px 20px rgba(0,0,0,.5);}
  #tip.on{opacity:1;}
  /* chips de métricas: etiqueta oculta en tarjeta, se abre al tocar */
  .chips:not(.ficha) .chip .cl{display:none;}
  .chips:not(.ficha) .chip.open .cl{display:inline;}
  .chip{cursor:pointer;}
  .chip svg{width:13px;height:13px;vertical-align:-2px;opacity:.85;}
  .lectura{font-family:Instrument Serif,Georgia,serif;font-size:19px;line-height:1.35;color:var(--negro);}
  .lectura b{color:var(--oro);font-weight:normal;}
</style>
</head>
<body>
<header>
  <a class="logo" href="https://yodesarrollo.mx" target="_blank" rel="noopener"><img class="logo-img" src="img/yod-logo.png" alt="Yo Desarrollo"><span class="sub">Tablero de medición</span></a>
  <div class="hctrl">
    <span class="muted" id="periodo">—</span>
    <button id="badge" type="button" data-s="loading" title="Actualizar anuncios, leads y métricas desde internet"><span class="dot"></span><span class="t">Actualizar ahora</span></button>
  </div>
</header>
<main id="app"><p class="muted" style="padding:40px 0;text-align:center;">Cargando board…</p></main>
<div id="toast"></div>

<script>
(function(){
  "use strict";
  /* ============ CONFIG (mismo Apps Script que el cuestionario) ============ */
  /* ⚠ SHEET_URL: pega la URL /exec de la NUEVA implementación del Apps Script
     (el deployment anterior quedó archivado en la contención 2026-07-12).
     El acceso lo gobierna el Portero YOD: el backend exige la credencial (k)
     tanto para consultar el board como para registrar gasto. */
  var CONFIG = {
    SHEET_URL: "https://script.google.com/macros/s/AKfycbztAKA7K5QwO6k45PqjixYLNppLypzCpoz2KvNIkML8kciBLZVKKoais8__0DnYuEQQOg/exec",
    META_EVENTS_URL: "https://business.facebook.com/events_manager2/list/dataset/1563269895817275/overview",
    FETCH_TIMEOUT: 12000,
    REFRESH_MS: 600000,
    METRICS_URL: "metrics.json",   /* metricas de publicaciones (lo genera pull_metrics.py) */
    POT_URL: "https://script.google.com/macros/s/AKfycbw3EB-6Q9Mq-ouDU-JvKMrRUaw4auYVeGkKja783yJ7_dEpCOW8xoMhs8IQMDojmlDB3A/exec"   /* Apps Script del formulario Plan de Potencial (imán 'pot') — su propio ?recurso=board */
  };
  var PORTERO_LSK="pyod_clave_v1";   /* credencial que escribe portero.js */
  function credencial(){ try{return window.__PYOD_BOOT||localStorage.getItem(PORTERO_LSK)||"";}catch(e){return window.__PYOD_BOOT||"";} }
  function credencialRechazada(){ try{localStorage.removeItem(PORTERO_LSK);sessionStorage.removeItem("pyod_rol");}catch(e){} location.reload(); }
  var QKEY="aurum_board_q_v1";
  var DATA=null, LAST=null, METRICS=null, DATA_POT=null;

  /* ============ SNAPSHOT EMBEBIDO (se ve aunque el .gs aún no esté desplegado) ============
     Mismos campos que devuelve GET ?recurso=board. Se reemplaza por datos en vivo al cargar. */
  var SNAP = {
    meta:{actualizado:null, periodo:"Ejemplo (datos ficticios)", semana:"", es_snapshot:true},
    kpis:{leads:18, citas:4, clientes:1, nuevos_sin_tocar_24h:2},
    prev:{leads:12, citas:2, clientes:1},
    gasto:{semana_actual:6000, total:22000, por_campana:[{campana:"Casa Mona",monto:3500},{campana:"Carrusel Terreno",monto:2500}]},
    funnel:[{etapa:"Leads",n:47},{etapa:"Citas",n:11},{etapa:"Clientes",n:3}],
    por_estado:[{estado:"NUEVO",n:28},{estado:"SESIÓN AGENDADA",n:11},{estado:"CLIENTE",n:3},{estado:"DESCARTADO",n:5}],
    por_fuente:[{fuente:"meta",leads:31,citas:8},{fuente:"(directo)",leads:12,citas:2},{fuente:"instagram",leads:4,citas:1}],
    por_dia:[{dia:"lunes",leads:9,citas:3},{dia:"martes",leads:6,citas:1},{dia:"miércoles",leads:8,citas:2},{dia:"jueves",leads:5,citas:1},{dia:"viernes",leads:7,citas:2},{dia:"sábado",leads:8,citas:2},{dia:"domingo",leads:4,citas:0}],
    embudo_cuestionario:{visitas:240, pasos:[{paso:"p0",etiqueta:"Inicio",n:240},{paso:"p1",etiqueta:"Estilo",n:188},{paso:"p2",etiqueta:"Sensación",n:150},{paso:"p3",etiqueta:"Momentos",n:128},{paso:"p4",etiqueta:"Carácter",n:104},{paso:"p5",etiqueta:"Esencial",n:79},{paso:"p6",etiqueta:"Sueños",n:61},{paso:"p7",etiqueta:"Formulario",n:47},{paso:"p8",etiqueta:"Cierre",n:18},{paso:"lead",etiqueta:"Dejó datos",n:18},{paso:"agenda",etiqueta:"Agendó",n:5}], ab:{A:{visita:120,lead:8,agenda:2},B:{visita:120,lead:11,agenda:4}}, canal:{whatsapp:3,calendario:2}},
    alertas:[{tipo:"amar",texto:"Esto es un EJEMPLO. El board cobra vida cuando el Apps Script sirva recurso=board y entre tráfico real."}],
    recientes:[]
  };

  /* ============ HELPERS ============ */
  function $(id){return document.getElementById(id);}
  function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
  function num(v){var n=parseFloat(String(v==null?0:v).replace(/[^0-9.\-]/g,""));return isNaN(n)?0:n;}
  function money(n){return "$"+Math.round(num(n)).toLocaleString("es-MX");}
  function pct(a,b){b=num(b);return b>0?Math.round(num(a)/b*100):0;}
  /* codificacion densa en celda (TU convencion): "campaña::monto" por linea -> [{campana,monto}] */
  function parsePares(txt){return String(txt||"").split("\n").map(function(l){l=l.trim();if(!l)return null;var p=l.split("::");return {a:(p[0]||"").trim(), b:(p[1]||"").trim()};}).filter(Boolean);}
  function flechaHTML(act,prev){
    act=num(act);prev=num(prev);
    if(!prev) return '<span class="d flat">— sin comparativo</span>';
    var dif=act-prev, p=Math.round(dif/prev*100);
    if(dif>0) return '<span class="d up">▲ '+p+'% vs. anterior</span>';
    if(dif<0) return '<span class="d down">▼ '+Math.abs(p)+'% vs. anterior</span>';
    return '<span class="d flat">= igual</span>';
  }

  /* ============ BADGE / FETCH (siempre en línea; nunca pinta datos cacheados) ============ */
  function setBadge(s){
    var b=$("badge"); if(!b) return;
    var labels={live:"Al día",partial:"Actualización parcial",error:"No se pudo actualizar",loading:"Actualizando…",snapshot:"Sin datos en línea"};
    b.setAttribute("data-s",s); b.querySelector(".t").textContent=labels[s]||s;
  }
  function fetchData(manual){
    if(!CONFIG.SHEET_URL) return Promise.resolve({ok:false,source:"leads",reason:"controlador_sin_url"});
    var url=CONFIG.SHEET_URL+(CONFIG.SHEET_URL.indexOf("?")<0?"?":"&")+"recurso=board&k="+encodeURIComponent(credencial())+"&cb="+Date.now();
    var ctrl=new AbortController(), t=setTimeout(function(){ctrl.abort();},CONFIG.FETCH_TIMEOUT);
    return fetch(url,{signal:ctrl.signal,cache:"no-store"}).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();}).then(function(j){
      clearTimeout(t);
      if(j && j.error==="liga"){ credencialRechazada(); return; }
      if(j && j.kpis){
        DATA=j; LAST=Date.now();
        render(); return {ok:true,source:"leads"};
      }
      return {ok:false,source:"leads",reason:"respuesta_invalida"};
    }).catch(function(e){
      clearTimeout(t); console.warn("[board] fetchData falló:",e); return {ok:false,source:"leads",reason:e.message};
    });
  }
  /* --- metricas de publicaciones (archivo del propio board, mismo origen) --- */
  function fetchMetrics(){
    var url=CONFIG.METRICS_URL+(CONFIG.METRICS_URL.indexOf("?")<0?"?":"&")+"cb="+Date.now();
    return fetch(url,{cache:"no-store"}).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();}).then(function(j){
      if(j && j.posts){ METRICS=j; if(DATA) render(); return {ok:true,source:"anuncios"}; }
      return {ok:false,source:"anuncios",reason:"respuesta_invalida"};
    }).catch(function(e){
      console.warn("[board] fetchMetrics falló:",e);
      return {ok:false,source:"anuncios",reason:e.message};
    });
  }
  /* --- embudo Plan de Potencial (2º imán): su PROPIO Apps Script ?recurso=board --- */
  function fetchPot(){
    if(!CONFIG.POT_URL) return Promise.resolve({ok:false,source:"potencial",reason:"controlador_sin_url"});
    var url=CONFIG.POT_URL+(CONFIG.POT_URL.indexOf("?")<0?"?":"&")+"recurso=board&k="+encodeURIComponent(credencial())+"&cb="+Date.now();
    return fetch(url,{cache:"no-store"}).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();}).then(function(j){
      if(j && j.error==="liga"){ credencialRechazada(); return {ok:false,source:"potencial",reason:"liga"}; }
      if(j && j.funnel){ DATA_POT=j; if(DATA) render(); return {ok:true,source:"potencial"}; }   /* re-render siempre: la cabecera "Hoy" usa datos pot */
      return {ok:false,source:"potencial",reason:"respuesta_invalida"};
    }).catch(function(e){
      console.warn("[board] fetchPot falló:",e);
      return {ok:false,source:"potencial",reason:e.message};
    });
  }

  function actualizarTodo(manual){
    setBadge("loading");
    var b=$("badge"); if(b)b.disabled=true;
    return Promise.all([fetchData(manual),fetchMetrics(),fetchPot()]).then(function(resultados){
      var bien=resultados.filter(function(r){return r&&r.ok;}).length;
      if(!DATA){ DATA=SNAP; render(); }
      setBadge(bien===resultados.length?"live":(bien?"partial":"error"));
      if(manual){
        if(bien===resultados.length) toast("Anuncios, leads y métricas actualizados desde internet");
        else {
          var faltan=resultados.filter(function(r){return !r||!r.ok;}).map(function(r){return r&&r.source||"fuente";}).join(", ");
          toast("Actualización parcial. Falta conectar: "+faltan,true);
        }
      }
      return resultados;
    }).finally(function(){if(b)b.disabled=false;});
  }

  /* ============ ESCRITURA (POST GASTO con cola offline, igual que tu patrón) ============ */
  function postSheet(payload){
    if(!CONFIG.SHEET_URL) return Promise.reject(new Error("sin URL del Apps Script"));
    payload.k=credencial();            /* credencial del Portero */
    var ctrl=new AbortController(), t=setTimeout(function(){ctrl.abort();},CONFIG.FETCH_TIMEOUT);
    return fetch(CONFIG.SHEET_URL,{method:"POST",body:JSON.stringify(payload),signal:ctrl.signal})
      .then(function(r){clearTimeout(t);return r.json();})
      .then(function(j){if(j&&j.ok)return j;if(j&&j.error==="liga")credencialRechazada();throw new Error((j&&j.error)||"rechazado");});
  }
  function qload(){try{return JSON.parse(localStorage.getItem(QKEY))||[];}catch(e){return [];}}
  function qsave(q){try{localStorage.setItem(QKEY,JSON.stringify(q));}catch(e){}}
  function flushQueue(){
    var q=qload(); if(!q.length) return;
    postSheet(Object.assign({},q[0])).then(function(){var q2=qload();q2.shift();qsave(q2);if(q2.length)flushQueue();else toast("Gasto sincronizado con el Sheet");}).catch(function(){});
  }
  window.addEventListener("online",flushQueue); setInterval(flushQueue,45000); setTimeout(flushQueue,3000);

  var TT=null;
  function toast(msg,warn){var el=$("toast");el.className=warn?"warn":"";el.textContent=msg;el.classList.add("on");clearTimeout(TT);TT=setTimeout(function(){el.classList.remove("on");},3200);}

  /* ============ RENDER ============ */
  function render(){
    var d=DATA||SNAP, k=d.kpis||{}, g=d.gasto||{};
    /* en el header: cuándo se actualizó cada fuente, para que nunca quede la duda de si el board está vivo */
    var _fresh=(d.meta&&d.meta.periodo)||"";
    if(METRICS&&METRICS.generado) _fresh+=(_fresh?" · ":"")+"redes al "+METRICS.generado.slice(5);
    $("periodo").textContent=_fresh;
    var costoCita = num(k.citas)>0 ? money(num(g.semana_actual)/num(k.citas)) : "—";

    /* --- primero los DATOS de hoy: el hero y las tarjetas salen de los MISMOS números (nunca se contradicen) --- */
    var CRM_URL="https://docs.google.com/spreadsheets/d/1z1ZtvcUKnx4MUfxLICo8x5bTihlDY8tBC3j2sYwNvg8/edit";
    var P=(DATA_POT&&DATA_POT.kpis)?DATA_POT.kpis:null;
    var totArq=(d.funnel&&d.funnel[0])?num(d.funnel[0].n):0;
    var totLeads=totArq+(P?num(P.leads):0);
    var sinTocar=num(k.nuevos_sin_tocar_24h)+(P?num(P.nuevos):0);
    /* visitas de HOY de verdad (el registro por día solo crea fila cuando alguien entra:
       si el último día con fila es viejo, eso NO significa que el board esté desactualizado) */
    var _hoyISO=(function(){var d2=new Date(),p=function(n){return(n<10?'0':'')+n;};return d2.getFullYear()+'-'+p(d2.getMonth()+1)+'-'+p(d2.getDate());})();
    function visDia(serie){ if(!serie||!serie.length) return {hoy:0,ult:null}; var u=serie[serie.length-1]; return {hoy:(u.fecha===_hoyISO)?num(u.visitas):0, ult:u.fecha}; }
    var dArq=visDia(d.actividad_por_dia), dPot=visDia(DATA_POT&&DATA_POT.actividad_por_dia);
    var visHoy=dArq.hoy+dPot.hoy;
    var _ultTraf=[dArq.ult,dPot.ult].filter(Boolean).sort().pop();
    var visSub = visHoy>0 ? "visitas de hoy · los dos formularios" : ('<span style="color:var(--amar)">hoy aún sin visitas</span>'+(_ultTraf?' · últ. tráfico '+esc(_ultTraf.slice(5)):''));
    /* series de 7 días (arq+pot sumadas por fecha) para las mini-tendencias */
    function serie7(campo){ var m={}; [(d.actividad_por_dia||[]),((DATA_POT&&DATA_POT.actividad_por_dia)||[])].forEach(function(s){ s.forEach(function(x){ if(x.fecha) m[x.fecha]=(m[x.fecha]||0)+num(x[campo]); }); }); var ks=Object.keys(m).sort(); return ks.slice(-7).map(function(kk){return m[kk];}); }
    function sparkMini(vals){ if(!vals||vals.length<2) return ''; var mx=Math.max.apply(null,vals.concat([1])); var w=120,hh=24; var pts=vals.map(function(v,i){var x=i/(vals.length-1)*w;var y=hh-(v/mx)*(hh-4)-2;return x.toFixed(1)+','+y.toFixed(1);}).join(' '); return '<svg class="spark" width="'+w+'" height="'+hh+'" viewBox="0 0 '+w+' '+hh+'" style="display:block;margin-top:5px;"><polyline points="'+pts+'" fill="none" stroke="var(--oro-tenue)" stroke-width="1.6"/></svg>'; }
    /* anillo de conversión lead→videollamada (pot): "¿voy bien?" sin leer texto */
    function anillo(agen,leads){ var r=17,c=2*Math.PI*r,pv=leads>0?Math.min(agen/leads,1):0; return '<svg width="44" height="44" viewBox="0 0 44 44" style="flex:none;"><circle cx="22" cy="22" r="'+r+'" fill="none" stroke="var(--arena)" stroke-width="5"/><circle class="ringp" cx="22" cy="22" r="'+r+'" fill="none" stroke="'+(agen>0?'var(--oro)':'var(--rojo)')+'" stroke-width="5" stroke-linecap="round" stroke-dasharray="'+c.toFixed(1)+'" stroke-dashoffset="'+(c*(1-pv)).toFixed(1)+'" transform="rotate(-90 22 22)"/></svg>'; }

    /* --- semáforo GLOBAL (mismos datos que las tarjetas) --- */
    var sem=semaforoGlobal(d,sinTocar,visHoy), html="";
    html+='<div class="semaforo '+sem.color+'"><div class="lbl">Ahora mismo</div><div class="msg">'+esc(sem.msg)+'</div></div>';
    if(d.meta&&d.meta.es_snapshot) html+='<p class="nota" style="margin-bottom:10px;">Mostrando ejemplo: el board cobra vida cuando el Apps Script sirva <code>recurso=board</code> y entre tráfico.</p>';

    /* --- nav de secciones (un tap y llegas; la página es larga) --- */
    html+='<nav class="secnav"><a href="#sec-hoy">Hoy</a><a href="#sec-acciones">Qué hacer</a><a href="#sec-semana">Semana</a><a href="#sec-embudo">Embudo</a><a href="#sec-trafico">Tráfico</a><a href="#sec-pubs">Publicaciones</a><a href="#sec-gasto">Gasto</a></nav>';

    /* --- HOY EN TU NEGOCIO: el ESTADO decide el énfasis (una tarjeta grita, las demás susurran) --- */
    var hayUrgente=sinTocar>0;
    html+='<h2 class="sec" id="sec-hoy">Hoy en tu negocio · los dos imanes</h2><div class="nums">';
    html+='<div class="num'+(hayUrgente?'':' star')+'"><div class="k">🎯 Videollamadas agendadas</div>'+
      '<div style="display:flex;align-items:center;gap:10px;">'+(P?anillo(num(P.agendadas),num(P.leads)):'')+'<div class="v"'+(P?' data-n="'+num(P.agendadas)+'"':'')+'>'+(P?num(P.agendadas):'…')+'</div></div>'+
      '<div class="sub">históricas · CRM Plan de Potencial'+(P&&num(P.leads)>0?' · <b style="color:var(--carbon)">'+pct(P.agendadas,P.leads)+'%</b> de sus '+num(P.leads)+' leads':'')+'</div></div>';
    html+=numHTML("Leads totales", totLeads, "", false, "históricos · cuestionario "+totArq+" · terreno "+(P?num(P.leads):"…")+sparkMini(serie7('lead')));
    html+='<div class="num '+(sinTocar>0?'urgente':'ok')+'"><div class="k">Sin contestar +24h</div><div class="v" data-n="'+sinTocar+'">'+sinTocar+'</div>'+
      '<div class="sub">'+(sinTocar>0?'llevan más de un día esperando':'todo contestado ✓')+'</div>'+
      (sinTocar>0?'<a class="cta" href="'+CRM_URL+'" target="_blank" rel="noopener">Abrir CRM →</a>':'')+'</div>';
    html+='<div class="num '+(visHoy>0?'ok':'warn')+'"><div class="k">Visitas de hoy</div><div class="v" data-n="'+visHoy+'">'+visHoy+'</div><div class="sub">'+visSub+sparkMini(serie7('visitas'))+'</div></div>';
    html+='</div>';

    /* --- QUÉ HACER HOY: acciones concretas (no regaños), ordenadas por dinero --- */
    var acc=[];
    if(sinTocar>0) acc.push({t:'Contesta a los <b>'+sinTocar+' leads NUEVO</b> que llevan más de 24 h esperando. <a href="'+CRM_URL+'" target="_blank" rel="noopener">Abrir CRM →</a>', rojo:true});
    if(METRICS && METRICS.dias_sin_publicar!=null && METRICS.dias_sin_publicar>=3) acc.push({t:'Publica hoy: llevas <b>'+METRICS.dias_sin_publicar+' días</b> sin post nuevo. <a href="#sec-pubs">Ver qué formato conviene ↓</a>'});
    if(num(g.semana_actual)===0 && !(d.meta&&d.meta.es_snapshot)) acc.push({t:'Registra el <b>gasto de pauta</b> de la semana — sin él no se puede calcular el costo por cita. <a href="#sec-gasto">Ir al formulario ↓</a>'});
    var yaCubiertas=/NUEVO sin tocar|gasto registrado|sin etiqueta UTM/i;
    var resto=(d.alertas||[]).filter(function(a){return !yaCubiertas.test(a.texto||'');});
    if(acc.length||resto.length){
      html+='<h2 class="sec" id="sec-acciones">Qué hacer hoy</h2>';
      acc.slice(0,3).forEach(function(a,i){ html+='<div class="accion'+(a.rojo?' rojo':'')+'"><span class="an">'+(i+1)+'</span><span>'+a.t+'</span></div>'; });
      resto.forEach(function(a){var ic=a.tipo==="rojo"?"⛔":a.tipo==="verde"?"✅":"⚠️";html+='<div class="alert '+(a.tipo||"amar")+'"><span class="ai">'+ic+'</span><span>'+esc(a.texto)+'</span></div>';});

    }
    /* generador de link CON el ID de este post (a diferencia del de arriba, que usa la fecha
       de hoy para posts nuevos, este sirve para editar posts YA publicados: cada uno queda con
       su propio identificador, asi que no se mezclan aunque edites varios el mismo dia) */
    if(!isIG){
      h+='<div class="fblock">Link con seguimiento para ESTE post</div>'+
        '<div class="pfrow"><div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">'+
          '<select id="lgDestP" onchange="genLinkPost(&#39;'+esc(p.id)+'&#39;)" style="padding:7px 9px;border:1px solid var(--linea);border-radius:5px;font-size:12px;background:#16161a;color:var(--negro);">'+
            '<option value="pot">Plan de Potencial</option><option value="cuest">Cuestionario</option>'+
          '</select>'+
          '<input id="lgUrlP" readonly onclick="this.select()" style="flex:1;min-width:200px;padding:7px 9px;border:1px solid var(--linea);border-radius:5px;font-size:11px;background:var(--crema);color:var(--carbon);font-family:JetBrains Mono,monospace;">'+
          '<button class="chipbtn on" onclick="copiarLinkPost()" style="min-height:34px;">Copiar</button>'+
        '</div><div style="font-size:10.5px;color:var(--piedra);margin-top:6px;">Edita este post en Facebook y pega este link en el texto — no el generador general de arriba (ese es para posts nuevos, este es solo para este post).</div></div>';
    }
    /* crecimiento */
    var sp=sparkline(p.serie);
    if(sp) h+='<div class="pfrow"><b>Crecimiento del alcance</b>'+sp+'</div>';
    /* (el lado de Facebook ya tiene su propio bloque arriba; el renglón "También en Facebook" se retiró) */
    h+='<div class="pfrow"><span class="muted">Los «leads de este post» solo se pueden medir del lado Facebook (con el link medible); Instagram no permite un link por publicación — solo el de tu biografía.</span></div>';
    h+='</div>';
    return h;
  }
  if(!window.abrirFicha){
    window.cerrarFicha=function(){ var o=document.getElementById('pov'); if(o&&o.parentNode) o.parentNode.removeChild(o); };
    window.abrirFicha=function(id){
      var ctx=window.__PUB||{byId:{}}; var p=ctx.byId[id]; if(!p) return;
      window.cerrarFicha();
      var o=document.createElement('div'); o.id='pov'; o.className='pov';
      o.addEventListener('click',function(e){ if(e.target===o) window.cerrarFicha(); });
      o.innerHTML=fichaHTML(p,ctx);
      document.body.appendChild(o);
      if(window.genLinkPost && $("lgUrlP")) window.genLinkPost(p.id);
    };
    window.pubSet=function(grp,val){ window.__PUBF=window.__PUBF||{orden:'reciente',red:'todas',verMas:false}; window.__PUBF[grp]=(grp==='verMas')?!!val:val; if(grp!=='verMas') window.__PUBF.verMas=false; if(typeof render==='function') render(); };
    document.addEventListener('keydown',function(e){ if(e.key==='Escape') window.cerrarFicha(); });
    /* ---- generador de link con UTM para el proximo post de Facebook (atribucion real, solo FB) ---- */
    var LG_DEST={pot:'https://alexpueblag.github.io/plan-potencial/',cuest:'https://alexpueblag.github.io/aurum-experiencia/'};
    window.genLinkFB=function(){
      var sel=$("lgDest"), inp=$("lgUrl"); if(!sel||!inp) return;
      var d=new Date(), pad=function(n){return (n<10?"0":"")+n;};
      var fecha=d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
      inp.value=LG_DEST[sel.value]+"?utm_source=facebook&utm_medium=social&utm_campaign=fb-"+fecha;
    };
    window.copiarLinkFB=function(){
      var inp=$("lgUrl"); if(!inp) return;
      inp.select(); inp.setSelectionRange(0,99999);
      if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(inp.value).then(function(){toast("Link copiado ✓");}).catch(function(){toast("No se pudo copiar — selecciona el texto y copia a mano",true);});
      } else {
        try{document.execCommand("copy"); toast("Link copiado ✓");}catch(e){toast("No se pudo copiar — selecciona el texto y copia a mano",true);}
      }
    };
    /* ---- generador de link CON EL ID de un post ya publicado (edicion retroactiva, no se mezcla con otros) ---- */
    window.genLinkPost=function(postId){
      var sel=$("lgDestP"), inp=$("lgUrlP"); if(!sel||!inp) return;
      var shortid=String(postId).split("_").pop().slice(-10);
      inp.value=LG_DEST[sel.value]+"?utm_source=facebook&utm_medium=social&utm_campaign=fb-"+shortid;
    };
    window.copiarLinkPost=function(){
      var inp=$("lgUrlP"); if(!inp) return;
      inp.select(); inp.setSelectionRange(0,99999);
      if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(inp.value).then(function(){toast("Link copiado ✓");}).catch(function(){toast("No se pudo copiar — selecciona el texto y copia a mano",true);});
      } else {
        try{document.execCommand("copy"); toast("Link copiado ✓");}catch(e){toast("No se pudo copiar — selecciona el texto y copia a mano",true);}
      }
    };
  }

  /* el hero sale de LOS MISMOS datos que las tarjetas de "Hoy" (sinTocar, visHoy) — nunca se contradicen */
  function semaforoGlobal(d,sinTocar,visHoy){
    var k=d.kpis||{}, g=d.gasto||{};
    var gasto=num(g.semana_actual), citas=num(k.citas), leads=num(k.leads);
    if(d.meta&&d.meta.es_snapshot) return {color:"gris",msg:"Esperando datos reales para encender el semáforo."};
    if(sinTocar>0) return {color:"rojo",msg:sinTocar+" lead"+(sinTocar>1?"s":"")+" espera"+(sinTocar>1?"n":"")+" tu respuesta desde hace más de un día. Eso es lo primero."};
    if(gasto>0 && leads===0) return {color:"rojo",msg:"Gastaste "+money(gasto)+" y 0 leads esta semana. Revisa el anuncio o la página."};
    if(citas>0){var cc=gasto>0?(" a "+money(gasto/citas)+" c/u"):"";return {color:"verde",msg:citas+" cita"+(citas>1?"s":"")+" agendada"+(citas>1?"s":"")+" esta semana"+cc+". Vas bien."};}
    if(gasto>0 && citas===0 && leads>0) return {color:"amar",msg:leads+" leads pero 0 citas. El cuestionario o el seguimiento no están cerrando."};
    if(visHoy===0 && METRICS && num(METRICS.dias_sin_publicar)>=5) return {color:"amar",msg:"Sin visitas hoy y "+num(METRICS.dias_sin_publicar)+" días sin publicar — hora de meter tráfico."};
    return {color:"amar",msg:"Sin citas nuevas esta semana. Mete tráfico y vigila el embudo."};
  }

  function guardarGasto(){
    var semana=($("gSemana").value||"").trim(), monto=($("gMonto").value||"").trim(),
        camp=($("gCamp").value||"").trim();
    if(!semana||!monto){ toast("Pon al menos la semana y el monto",true); return; }
    var payload={tipo:"gasto", semana:semana, monto:num(monto), campanas:camp};
    var btn=$("gGuardar"); btn.disabled=true; btn.textContent="Guardando…";
    postSheet(payload).then(function(){
      toast("Gasto de "+semana+" guardado ✓"); btn.disabled=false; btn.textContent="Guardar en el Sheet";
      $("gMonto").value="";$("gCamp").value=""; fetchData(false);
    }).catch(function(err){
      /* sin conexión o rechazo: encola y reintenta */
      if(!navigator.onLine){ var q=qload(); q.push(payload); qsave(q); toast("Sin conexión: guardado en cola, se sube al reconectar"); }
      else toast("No se pudo guardar: "+(err&&err.message||"error"),true);
      btn.disabled=false; btn.textContent="Guardar en el Sheet";
    });
  }

  /* ============ ACCESO ============ */
  /* La clave de vista local se retiró: el acceso lo gobierna el Portero YOD
     (portero.js) y el backend no entrega datos sin su credencial. */

  /* ============ ARRANQUE ============ */
  function iniciar(){
    $("badge").addEventListener("click",function(){actualizarTodo(true);});
    window.addEventListener("pyod-authenticated",function(e){
      window.__PYOD_BOOT=e&&e.detail&&e.detail.token||window.__PYOD_BOOT||"";
      actualizarTodo(true);
    });
    document.addEventListener("visibilitychange",function(){if(document.visibilityState==="visible"&&(!LAST||Date.now()-LAST>CONFIG.REFRESH_MS)){actualizarTodo(false);}});
    setInterval(function(){if(document.visibilityState==="visible")actualizarTodo(false);},CONFIG.REFRESH_MS);
    actualizarTodo(false);
  }
  iniciar();
})();
</script>
