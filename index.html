<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Board · Aurum / Yo Desarrollo</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231a1a1a'/%3E%3Crect x='10' y='10' width='80' height='80' fill='none' stroke='%23b8975a' stroke-width='4'/%3E%3Ctext x='50' y='66' font-family='Georgia,serif' font-size='40' fill='%23b8975a' text-anchor='middle'%3EAu%3C/text%3E%3C/svg%3E">
<style>
  :root{--negro:#1a1a1a;--oro:#b8975a;--crema:#faf7f2;--arena:#ece6da;--piedra:#8a7d65;--carbon:#6b6055;--linea:#e0d9cc;
    --verde:#4e7a5a;--amar:#c08a3e;--rojo:#a05252;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--crema);color:var(--negro);font-family:'Helvetica Neue',Arial,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;}
  .serif{font-family:Georgia,serif;}
  header{background:var(--negro);border-bottom:1px solid var(--oro);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:50;}
  .logo{display:flex;align-items:center;gap:11px;}
  .logo-box{width:38px;height:38px;border:1px solid var(--oro);color:var(--oro);display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:15px;flex:none;}
  .logo .nm{color:#f4f1ec;letter-spacing:2px;font-weight:bold;font-size:12px;}
  .logo .sub{color:var(--oro);font-size:10px;letter-spacing:1.5px;}
  .hctrl{display:flex;align-items:center;gap:10px;}
  #badge{display:flex;align-items:center;gap:6px;font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:#cfc6b4;border:1px solid #3a3a3a;border-radius:20px;padding:5px 11px;cursor:pointer;}
  #badge .dot{width:7px;height:7px;border-radius:50%;background:#888;}
  #badge[data-s="live"] .dot{background:var(--verde);} #badge[data-s="live"]{color:#bcd3c2;}
  #badge[data-s="cache"] .dot{background:var(--amar);} #badge[data-s="error"] .dot{background:var(--rojo);}
  #badge[data-s="loading"] .dot{background:var(--oro);animation:pulse 1s infinite;}
  @keyframes pulse{50%{opacity:.3;}}
  main{max-width:1080px;margin:0 auto;padding:22px 18px 90px;}
  h2.sec{font-family:Georgia,serif;font-weight:normal;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--piedra);margin:26px 0 12px;}
  /* semaforo */
  .semaforo{border-radius:6px;padding:18px 22px;color:#fff;margin-bottom:8px;}
  .semaforo.verde{background:var(--verde);} .semaforo.amar{background:var(--amar);} .semaforo.rojo{background:var(--rojo);} .semaforo.gris{background:var(--carbon);}
  .semaforo .lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:.85;}
  .semaforo .msg{font-family:Georgia,serif;font-size:clamp(18px,3vw,24px);margin-top:4px;line-height:1.3;}
  /* numerotes */
  .nums{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
  .num{background:#fff;border:1px solid var(--linea);border-radius:6px;padding:16px 18px;}
  .num .k{font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--piedra);}
  .num .v{font-family:Georgia,serif;font-size:clamp(26px,4vw,34px);color:var(--negro);margin-top:3px;line-height:1.05;}
  .num .v small{font-size:13px;color:var(--piedra);}
  .num .d{font-size:11px;margin-top:3px;} .num .d.up{color:var(--verde);} .num .d.down{color:var(--rojo);} .num .d.flat{color:var(--piedra);}
  .num.star{border-color:var(--oro);box-shadow:0 0 0 1px var(--oro);}
  /* funnel */
  .funnel{display:flex;gap:8px;flex-wrap:wrap;}
  .fstep{flex:1;min-width:120px;background:#fff;border:1px solid var(--linea);border-radius:6px;padding:14px 16px;position:relative;}
  .fstep .fn{font-family:Georgia,serif;font-size:30px;color:var(--oro);}
  .fstep .fl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--piedra);}
  .fstep .fr{font-size:11px;color:var(--carbon);margin-top:2px;}
  /* tablas */
  table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--linea);border-radius:6px;overflow:hidden;font-size:13px;}
  th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--linea);}
  th{font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--piedra);background:var(--arena);}
  td.r,th.r{text-align:right;font-family:Georgia,serif;}
  tr:last-child td{border-bottom:none;}
  /* barras por dia */
  .bars{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .bar{background:#fff;border:1px solid var(--linea);border-radius:5px;padding:8px 4px;text-align:center;}
  .bar .bd{font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:var(--piedra);}
  .bar .bn{font-family:Georgia,serif;font-size:18px;color:var(--negro);margin-top:2px;}
  .bar .bc{font-size:9.5px;color:var(--oro);}
  /* alertas */
  .alert{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--linea);border-left-width:4px;border-radius:5px;padding:10px 14px;margin-bottom:7px;font-size:13px;}
  .alert.verde{border-left-color:var(--verde);} .alert.amar{border-left-color:var(--amar);} .alert.rojo{border-left-color:var(--rojo);}
  .alert .ai{font-size:15px;}
  /* gasto form */
  .card{background:#fff;border:1px solid var(--linea);border-radius:6px;padding:18px;}
  .card p.h{font-family:Georgia,serif;font-size:16px;margin-bottom:4px;}
  .card p.s{font-size:12px;color:var(--piedra);margin-bottom:14px;}
  .frow{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
  .fld{flex:1;min-width:130px;} .fld label{display:block;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--piedra);margin-bottom:4px;}
  .fld input,.fld textarea{width:100%;padding:10px 12px;border:1px solid var(--linea);border-radius:5px;font-size:14px;font-family:inherit;background:var(--crema);}
  .fld textarea{min-height:64px;resize:vertical;}
  .btn{background:var(--oro);color:var(--negro);border:none;border-radius:5px;padding:11px 22px;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;cursor:pointer;}
  .btn:hover{background:#a3854e;} .btn:disabled{opacity:.5;cursor:default;}
  .hint{font-size:11px;color:var(--piedra);margin-top:8px;line-height:1.5;}
  .hint code{background:var(--arena);padding:1px 5px;border-radius:3px;font-size:11px;}
  .nota{font-size:12px;color:var(--piedra);font-style:italic;line-height:1.5;}
  .link-meta{display:inline-block;margin-top:6px;color:var(--oro);font-size:13px;text-decoration:none;border-bottom:1px solid var(--oro);}
  #toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--negro);color:#f4f1ec;padding:12px 20px;border-radius:6px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:90;max-width:90%;}
  #toast.on{opacity:1;} #toast.warn{background:var(--rojo);}
  .muted{color:var(--piedra);font-size:12px;}
  /* galeria de publicaciones */
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
  .pcard{background:#fff;border:1px solid var(--linea);border-radius:8px;overflow:hidden;cursor:pointer;transition:transform .12s,box-shadow .12s;position:relative;}
  .pcard:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.10);border-color:var(--oro);}
  .pcard .cov{width:100%;aspect-ratio:4/5;object-fit:cover;display:block;background:var(--arena);}
  .pcard .ph{padding:8px 10px;}
  .pcard .pt{font-size:11px;color:var(--carbon);display:flex;justify-content:space-between;align-items:center;}
  .pcard .pmain{font-family:Georgia,serif;font-size:17px;color:var(--negro);margin-top:2px;}
  .pcard .pmain small{font-size:11px;color:var(--piedra);font-family:inherit;}
  .pbadge{position:absolute;top:8px;left:8px;background:var(--oro);color:#1a1a1a;font-size:9px;font-weight:700;letter-spacing:1px;padding:3px 7px;border-radius:20px;text-transform:uppercase;}
  .pnet{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;font-family:Georgia,serif;}
  .pnet.ig{background:#c13584;} .pnet.fb{background:#1877f2;}
  .pcov-ph{width:100%;aspect-ratio:4/5;display:flex;align-items:center;justify-content:center;text-align:center;padding:10px;background:linear-gradient(135deg,var(--arena),#dccfb8);color:var(--carbon);font-size:11px;line-height:1.35;}
  /* ficha modal */
  .pov{position:fixed;inset:0;background:rgba(26,26,26,.55);z-index:80;display:flex;align-items:flex-start;justify-content:center;padding:24px 14px;overflow-y:auto;}
  .pficha{background:var(--crema);border-radius:10px;max-width:560px;width:100%;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .pfhead{display:flex;gap:14px;padding:16px;background:#fff;border-bottom:1px solid var(--linea);align-items:flex-start;}
  .pfhead img{width:96px;height:120px;border-radius:6px;flex:none;object-fit:cover;background:var(--arena);}
  .pfhead .pcov-ph{width:96px;height:120px;border-radius:6px;flex:none;aspect-ratio:auto;}
  .pfhead .pfx{flex:1;min-width:0;}
  .pfx .pftipo{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--piedra);}
  .pfx .pftit{font-family:Georgia,serif;font-size:15px;margin:3px 0;line-height:1.3;}
  .pfclose{cursor:pointer;font-size:22px;color:var(--piedra);background:none;border:none;line-height:1;padding:0 2px;flex:none;}
  .fmgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--linea);}
  .fm{background:#fff;padding:11px 12px;}
  .fm .fk{font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--piedra);}
  .fm .fv{font-family:Georgia,serif;font-size:22px;color:var(--negro);line-height:1.1;margin-top:2px;}
  .fm .fv small{font-size:11px;color:var(--piedra);}
  .fm .fsub{font-size:10px;color:var(--oro);margin-top:2px;line-height:1.2;}
  .fm.nd .fv{color:var(--piedra);font-size:15px;}
  .pfrow{padding:11px 16px;border-top:1px solid var(--linea);font-size:12px;color:var(--carbon);}
  .pfrow b{color:var(--negro);}
  .spark{display:block;margin-top:6px;}
  /* franja de decisión + hueco del lead */
  .decision{background:linear-gradient(135deg,#fff,#f3ecdd);border:1px solid var(--oro);border-left:4px solid var(--oro);border-radius:8px;padding:14px 18px;margin-bottom:10px;}
  .decision .dl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--piedra);}
  .decision .dm{font-family:Georgia,serif;font-size:clamp(15px,2.2vw,19px);color:var(--negro);margin-top:3px;line-height:1.4;}
  .decision .dm b{color:#8a6d34;}
  .leadgap{display:flex;gap:11px;align-items:flex-start;background:#fbf1ec;border:1px solid var(--rojo);border-left:4px solid var(--rojo);border-radius:8px;padding:12px 16px;margin-bottom:14px;}
  .leadgap .li{font-size:18px;line-height:1.2;flex:none;}
  .leadgap .lt{font-size:13px;color:#7a3b3b;line-height:1.45;}
  .leadgap .lt b{color:var(--rojo);}
  /* KPIs de referencia (de-enfatizados) */
  .kref{display:flex;flex-wrap:wrap;gap:5px 16px;font-size:12.5px;color:var(--piedra);margin-bottom:13px;padding:9px 13px;background:#fff;border:1px solid var(--linea);border-radius:6px;align-items:center;}
  .kref .kt{font-size:9.5px;letter-spacing:1px;text-transform:uppercase;}
  .kref b{font-family:Georgia,serif;color:var(--carbon);font-weight:normal;}
  /* controles de orden/filtro */
  .pfilters{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:13px;}
  .pfilters .pfl{font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--piedra);}
  .chipbtn{font-size:12.5px;border:1px solid var(--linea);background:#fff;color:var(--carbon);border-radius:20px;padding:6px 13px;cursor:pointer;}
  .chipbtn.on{background:var(--negro);color:#f4f1ec;border-color:var(--negro);}
  /* tarjeta: ángulo + affordance + legibilidad */
  .pcard .pt{font-size:12px;}
  .pcard .pmain{font-size:17px;margin-top:3px;}
  .pcard .pmain b{font-family:Georgia,serif;} .pcard .pmain small{font-size:11px;color:var(--piedra);}
  .pfoot{display:flex;justify-content:space-between;align-items:center;margin-top:6px;gap:6px;}
  .pang{font-size:10px;color:#8a6d34;background:#f3ecdd;border-radius:20px;padding:2px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pgo{font-size:11px;color:#8a6d34;font-weight:600;flex:none;}
  .pmore{display:inline-block;margin-top:12px;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#8a6d34;border:1px solid var(--oro);border-radius:20px;padding:8px 16px;cursor:pointer;background:#fff;}
  .pcount{font-size:11.5px;color:var(--piedra);margin:10px 0 2px;}
  /* ficha: hero + bloques + tiles legibles */
  .pfhead img{width:128px;height:160px;}
  .pfx .pftit{font-size:14px;}
  .fblock{font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--piedra);background:var(--arena);padding:7px 16px;}
  .fm .fk{font-size:10px;}
  .fm.gap{background:#fbf1ec;} .fm.gap .fv{color:var(--rojo);font-size:15px;} .fm.gap .fsub{color:var(--rojo);}
  .pfclose{font-size:24px;min-width:40px;min-height:40px;}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-box">Au</div><div><div class="nm">AURUM · YOD</div><div class="sub">BOARD DE MEDICIÓN</div></div></div>
  <div class="hctrl">
    <span class="muted" id="periodo">—</span>
    <div id="badge" data-s="loading" title="Toca para actualizar"><span class="dot"></span><span class="t">Cargando…</span></div>
  </div>
</header>
<main id="app"><p class="muted" style="padding:40px 0;text-align:center;">Cargando board…</p></main>
<div id="toast"></div>

<script>
(function(){
  "use strict";
  /* ============ CONFIG (mismo Apps Script que el cuestionario) ============ */
  var CONFIG = {
    SHEET_URL: "https://script.google.com/macros/s/AKfycbw1Wm5wOC6XE2PcS0xBbIy-OdBbmU5vjvwnVNaHN6Fa7HHugyuk-EvkoURtr56j6dDVag/exec",
    WRITE_SECRET: "aurum-board-2026",   /* seguridad suave para escribir GASTO (debe igualar el .gs) */
    VIEW_KEY: "aurum2026",              /* clave para VER el board (seguridad suave, como tus otros boards) */
    META_EVENTS_URL: "https://business.facebook.com/events_manager2/list/dataset/1563269895817275/overview",
    FETCH_TIMEOUT: 12000,
    REFRESH_MS: 600000,
    METRICS_URL: "metrics.json"   /* metricas de publicaciones (lo genera pull_metrics.py) */
  };
  var CACHE_KEY="aurum_board_cache_v1", QKEY="aurum_board_q_v1", MCACHE="aurum_metrics_cache_v1";
  var DATA=null, LAST=null, METRICS=null;

  /* ============ SNAPSHOT EMBEBIDO (se ve aunque el .gs aún no esté desplegado) ============
     Mismos campos que devuelve GET ?recurso=board. Se reemplaza por datos en vivo al cargar. */
  var SNAP = {
    meta:{actualizado:null, periodo:"Ejemplo (datos ficticios)", semana:"", es_snapshot:true},
    kpis:{leads:18, citas:4, clientes:1, nuevos_sin_tocar_24h:2},
    prev:{leads:12, citas:2, clientes:1},
    gasto:{semana_actual:6000, total:22000, por_campana:[{campana:"Casa Mona",monto:3500},{campana:"Carrusel Terreno",monto:2500}]},
    funnel:[{etapa:"Leads",n:47},{etapa:"Citas",n:11},{etapa:"Clientes",n:3}],
    por_estado:[{estado:"NUEVO",n:28},{estado:"SESIÓN AGENDADA",n:11},{estado:"CLIENTE",n:3},{estado:"DESCARTADO",n:5}],
    por_fuente:[{fuente:"meta",leads:31,citas:8},{fuente:"(directo)",leads:12,citas:2},{fuente:"instagram",leads:4,citas:1}],
    por_dia:[{dia:"lunes",leads:9,citas:3},{dia:"martes",leads:6,citas:1},{dia:"miércoles",leads:8,citas:2},{dia:"jueves",leads:5,citas:1},{dia:"viernes",leads:7,citas:2},{dia:"sábado",leads:8,citas:2},{dia:"domingo",leads:4,citas:0}],
    embudo_cuestionario:{visitas:240, pasos:[{paso:"p0",etiqueta:"Inicio",n:240},{paso:"p1",etiqueta:"Estilo",n:188},{paso:"p2",etiqueta:"Sensación",n:150},{paso:"p3",etiqueta:"Momentos",n:128},{paso:"p4",etiqueta:"Carácter",n:104},{paso:"p5",etiqueta:"Esencial",n:79},{paso:"p6",etiqueta:"Sueños",n:61},{paso:"p7",etiqueta:"Formulario",n:47},{paso:"p8",etiqueta:"Cierre",n:18},{paso:"lead",etiqueta:"Dejó datos",n:18},{paso:"agenda",etiqueta:"Agendó",n:5}], ab:{A:{visita:120,lead:8,agenda:2},B:{visita:120,lead:11,agenda:4}}, canal:{whatsapp:3,calendario:2}},
    alertas:[{tipo:"amar",texto:"Esto es un EJEMPLO. El board cobra vida cuando el Apps Script sirva recurso=board y entre tráfico real."}],
    recientes:[]
  };

  /* ============ HELPERS ============ */
  function $(id){return document.getElementById(id);}
  function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
  function num(v){var n=parseFloat(String(v==null?0:v).replace(/[^0-9.\-]/g,""));return isNaN(n)?0:n;}
  function money(n){return "$"+Math.round(num(n)).toLocaleString("es-MX");}
  function pct(a,b){b=num(b);return b>0?Math.round(num(a)/b*100):0;}
  /* codificacion densa en celda (TU convencion): "campaña::monto" por linea -> [{campana,monto}] */
  function parsePares(txt){return String(txt||"").split("\n").map(function(l){l=l.trim();if(!l)return null;var p=l.split("::");return {a:(p[0]||"").trim(), b:(p[1]||"").trim()};}).filter(Boolean);}
  function flechaHTML(act,prev){
    act=num(act);prev=num(prev);
    if(!prev) return '<span class="d flat">— sin comparativo</span>';
    var dif=act-prev, p=Math.round(dif/prev*100);
    if(dif>0) return '<span class="d up">▲ '+p+'% vs. anterior</span>';
    if(dif<0) return '<span class="d down">▼ '+Math.abs(p)+'% vs. anterior</span>';
    return '<span class="d flat">= igual</span>';
  }

  /* ============ BADGE / FETCH (offline-first, igual que llave-maestra) ============ */
  function setBadge(s){
    var b=$("badge"); if(!b) return;
    var labels={live:"En vivo",cache:"Cache local",error:"Sin conexión",loading:"Actualizando…",snapshot:"Ejemplo"};
    b.setAttribute("data-s",s); b.querySelector(".t").textContent=labels[s]||s;
  }
  function fetchData(manual){
    setBadge("loading");
    var url=CONFIG.SHEET_URL+(CONFIG.SHEET_URL.indexOf("?")<0?"?":"&")+"recurso=board&cb="+Date.now();
    var ctrl=new AbortController(), t=setTimeout(function(){ctrl.abort();},CONFIG.FETCH_TIMEOUT);
    fetch(url,{signal:ctrl.signal}).then(function(r){return r.json();}).then(function(j){
      clearTimeout(t);
      if(j && j.kpis){
        DATA=j; LAST=Date.now();
        try{localStorage.setItem(CACHE_KEY,JSON.stringify(j));}catch(e){}
        render(); setBadge("live");
        if(manual) toast("Board actualizado");
      } else { usarCacheOSnap(); }   /* gs aún sin recurso=board → snapshot/cache (no es "sin conexión") */
    }).catch(function(e){
      clearTimeout(t); usarCacheOSnap();
    });
  }
  function usarCacheOSnap(){
    var c=null; try{c=JSON.parse(localStorage.getItem(CACHE_KEY));}catch(e){}
    if(c && c.kpis){ DATA=c; render(); setBadge("cache"); }
    else if(!DATA){ DATA=SNAP; render(); setBadge("snapshot"); }
  }
  /* --- metricas de publicaciones (archivo del propio board, mismo origen) --- */
  function fetchMetrics(){
    var url=CONFIG.METRICS_URL+(CONFIG.METRICS_URL.indexOf("?")<0?"?":"&")+"cb="+Date.now();
    fetch(url).then(function(r){return r.json();}).then(function(j){
      if(j && j.posts){ METRICS=j; try{localStorage.setItem(MCACHE,JSON.stringify(j));}catch(e){} if(DATA) render(); }
    }).catch(function(){
      try{var c=JSON.parse(localStorage.getItem(MCACHE)); if(c&&c.posts&&!METRICS){METRICS=c; if(DATA) render();}}catch(e){}
    });
  }

  /* ============ ESCRITURA (POST GASTO con cola offline, igual que tu patrón) ============ */
  function postSheet(payload){
    payload.secret=CONFIG.WRITE_SECRET;
    var ctrl=new AbortController(), t=setTimeout(function(){ctrl.abort();},CONFIG.FETCH_TIMEOUT);
    return fetch(CONFIG.SHEET_URL,{method:"POST",body:JSON.stringify(payload),signal:ctrl.signal})
      .then(function(r){clearTimeout(t);return r.json();})
      .then(function(j){if(j&&j.ok)return j;throw new Error((j&&j.error)||"rechazado");});
  }
  function qload(){try{return JSON.parse(localStorage.getItem(QKEY))||[];}catch(e){return [];}}
  function qsave(q){try{localStorage.setItem(QKEY,JSON.stringify(q));}catch(e){}}
  function flushQueue(){
    var q=qload(); if(!q.length) return;
    postSheet(Object.assign({},q[0])).then(function(){var q2=qload();q2.shift();qsave(q2);if(q2.length)flushQueue();else toast("Gasto sincronizado con el Sheet");}).catch(function(){});
  }
  window.addEventListener("online",flushQueue); setInterval(flushQueue,45000); setTimeout(flushQueue,3000);

  var TT=null;
  function toast(msg,warn){var el=$("toast");el.className=warn?"warn":"";el.textContent=msg;el.classList.add("on");clearTimeout(TT);TT=setTimeout(function(){el.classList.remove("on");},3200);}

        html+='<div class="bar"><div class="bd">'+dia+'</div><div class="bn">'+(row.leads||0)+'</div><div class="bc">'+(row.citas||0)+' citas</div></div>';

      d.alertas.forEach(function(a){var ic=a.tipo==="rojo"?"⛔":a.tipo==="verde"?"✅":"⚠️";html+='<div class="alert '+(a.tipo||"amar")+'"><span class="ai">'+ic+'</span><span>'+esc(a.texto)+'</span></div>';});

      '<div class="frow">'+
        '<div class="fld" style="max-width:150px;"><label>Semana</label><input id="gSemana" value="'+esc((d.meta&&d.meta.semana)||"")+'" placeholder="2026-W25"></div>'+
        '<div class="fld" style="max-width:160px;"><label>Gasto total (MXN)</label><input id="gMonto" inputmode="numeric" placeholder="3500"></div>'+
      '</div>'+
      '<div class="frow" style="margin-top:10px;"><div class="fld"><label>Campañas (una por línea: nombre::monto)</label>'+

      '<div class="frow" style="margin-top:10px;"><div class="fld" style="max-width:200px;"><label>Clave de escritura</label><input id="gClave" type="password" placeholder="clave del board"></div>'+

  function numHTML(k,v,delta,star){return '<div class="num'+(star?" star":"")+'"><div class="k">'+esc(k)+'</div><div class="v">'+esc(v)+'</div>'+(delta||"")+'</div>';}

  /* ============ COMPORTAMIENTO EN EL TIEMPO (serie por día del Apps Script) ============ */
  function serieTiempoHTML(serie){
    var h='<h2 class="sec">Comportamiento en el tiempo</h2>';
    if(!serie || !serie.length){
      return h+'<p class="nota">Se enciende al actualizar tu Apps Script (expone <code>actividad_por_dia</code> — te paso el código de 2 pasos). Mientras, el embudo de arriba es el <b>acumulado</b> de todos los días.</p>';
    }
    var s=serie.slice(-30);
    var maxV=Math.max.apply(null,s.map(function(x){return num(x.visitas);}).concat([1]));
    var peak=s.reduce(function(a,b){return num(b.visitas)>num(a.visitas)?b:a;},s[0]);
    var totV=s.reduce(function(a,b){return a+num(b.visitas);},0), totL=s.reduce(function(a,b){return a+num(b.lead);},0), totA=s.reduce(function(a,b){return a+num(b.agenda);},0);
    h+='<div class="kref"><span class="kt">Últimos '+s.length+' días</span><span>Visitas <b>'+totV+'</b></span><span>Leads <b>'+totL+'</b></span><span>Citas <b>'+totA+'</b></span><span>Día pico <b>'+esc(peak.fecha.slice(5))+'</b> ('+peak.visitas+')</span></div>';
    /* barras por día */
    h+='<div style="overflow-x:auto;padding-bottom:4px;"><div style="display:flex;align-items:flex-end;gap:3px;height:130px;min-width:100%;">';
    s.forEach(function(x){
      var hv=Math.round(num(x.visitas)/maxV*108), esLead=num(x.lead)>0, esPico=(x.fecha===peak.fecha);
      var col=esPico?'var(--oro)':(esLead?'var(--verde)':'var(--piedra)');
      h+='<div title="'+esc(x.fecha)+' · '+x.visitas+' visitas · '+x.empezaron+' empezaron · '+x.lead+' leads · '+x.agenda+' citas" style="flex:1 0 16px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:2px;height:100%;">'+
        (esLead?'<span style="font-size:9px;color:var(--verde);font-weight:bold;">'+x.lead+'</span>':'')+
        '<div style="width:100%;max-width:24px;height:'+Math.max(hv,3)+'px;background:'+col+';border-radius:3px 3px 0 0;"></div>'+
        '<span style="font-size:9px;color:var(--piedra);">'+esc(x.fecha.slice(8,10))+'</span>'+
      '</div>';
    });
    h+='</div></div>';
    h+='<p class="hint">Cada barra = un día (alto = más visitas). <span style="color:#8a6d34;font-weight:600">Oro</span> = día pico · <span style="color:var(--verde);font-weight:600">verde</span> = día con lead (con el número arriba). Pasa el dedo/mouse para ver el detalle. El número es el día del mes.</p>';
    /* horas del día */
    var hrs={}; s.forEach(function(x){ var H=x.horas||{}; Object.keys(H).forEach(function(k){ var hk=String(parseInt(k,10)); if(hk!=="NaN") hrs[hk]=(hrs[hk]||0)+num(H[k]); }); });
    if(Object.keys(hrs).length){
      var arrH=[]; for(var i=0;i<24;i++) arrH.push(hrs[String(i)]||0);
      var maxH=Math.max.apply(null,arrH.concat([1])), peakH=arrH.indexOf(Math.max.apply(null,arrH));
      h+='<h2 class="sec" style="margin-top:18px;">¿A qué hora llegan?</h2>';
      h+='<div style="display:flex;align-items:flex-end;gap:2px;height:64px;">';
      arrH.forEach(function(c,H){
        var hh=Math.round(c/maxH*52);
        h+='<div title="'+H+':00 — '+c+' visitas" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:2px;height:100%;"><div style="width:100%;height:'+Math.max(hh,2)+'px;background:'+(H===peakH&&c>0?'var(--oro)':'var(--arena)')+';border-radius:2px 2px 0 0;"></div><span style="font-size:8px;color:var(--piedra);">'+(H%3===0?H:'')+'</span></div>';
      });
      h+='</div><p class="hint">Hora del día (0–23 h) en que entran tus visitas. Pico: <b>'+peakH+':00</b>. Úsalo para programar publicaciones y dar seguimiento cuando están activos.</p>';
    }
    return h;
  }

  /* ============ PUBLICACIONES (redes) — decisión + galería + ficha ============ */
  function fmtN(n){ n=num(n); return n>=1000 ? (n/1000).toFixed(n>=10000?0:1)+"k" : String(Math.round(n)); }
  function ageDays(p){ var t=Date.parse((p.fecha||"")+"T12:00:00"); return isNaN(t)?99999:(Date.now()-t)/86400000; }
  function covHTML(p){ return p.cover ? '<img class="cov" src="'+esc(p.cover)+'" alt="" loading="lazy">' : '<div class="pcov-ph">'+esc((p.titulo||p.tipo||'').slice(0,60))+'</div>'; }
  /* nombres humanos (no jerga de la API) */
  function tipoLabel(t){ t=String(t||''); if(/reel/i.test(t))return 'Reel'; if(/video/i.test(t))return 'Video'; if(/carrus/i.test(t))return 'Carrusel'; if(/image|photo|foto/i.test(t))return 'Imagen'; return t.charAt(0).toUpperCase()+t.slice(1); }
  function formatoFam(t){ var L=tipoLabel(t); return (L==='Reel'||L==='Video')?'Video/Reel':(L==='Carrusel'?'Carrusel':'Imagen'); }
  /* ángulo del mensaje (auto, por palabras clave del texto) */
  function anguloDe(p){ var t=((p.titulo||'')).toLowerCase();
    if(/predial|cobra|cuesta|baldío|baldio|duerme|dormido|monte|costo/.test(t)) return 'Costo del baldío';
    if(/deuda|traspas|tu nombre|sigue siendo tuyo|sin compromiso|a tu nombre/.test(t)) return 'Sin deuda / tuyo';
    if(/co-?desarroll|juntos|asociaci|participas|nosotros pone/.test(t)) return 'Cómo funciona';
    if(/sueñ|hogar|despierta|potencial|vida|elefante/.test(t)) return 'Aspiracional';
    if(/plusval|invertir|inversión|inversion|preventa|crédito|credito|pension/.test(t)) return 'Inversión';
    return null; }
  function intenc(p){ return num(p.saves)+num(p.shares)+num(p.profile_visits); } /* proxy de lead: guardar+compartir+ir al perfil */
  function mergePosts(posts){
    var map={}, order=[];
    posts.forEach(function(p){
      var vid=/reel|video/i.test(p.tipo||'')?'v':'p';
      var key=p.fecha+'|'+vid+'|'+((p.titulo||'').slice(0,24));
      if(!map[key]){ map[key]={ig:null,fb:null}; order.push(key); }
      var slot=p.red==='IG'?'ig':'fb'; if(!map[key][slot]) map[key][slot]=p;
    });
    return order.map(function(k){ var g=map[k], base=g.ig||g.fb; base._fb=(g.ig&&g.fb)?g.fb:null; return base; });
  }
  function pubSection(){
    var F=window.__PUBF||(window.__PUBF={orden:'reciente',red:'todas',verMas:false});
    var h='<h2 class="sec">Publicaciones · toca una portada para ver su detalle</h2>';
    if(!METRICS || !(METRICS.posts||[]).length){
      return h+'<p class="nota">Aún sin métricas. Corre <code>pull_metrics.py</code> y sube <code>metrics.json</code> + <code>covers/</code> al board.</p>';
    }
    var posts=METRICS.posts.slice();
    var rec=posts.filter(function(p){return ageDays(p)<=30;});
    var igRec=rec.filter(function(p){return p.red==="IG";});
    var reach30=igRec.reduce(function(s,p){return s+num(p.reach);},0);
    var saves30=igRec.reduce(function(s,p){return s+num(p.saves);},0);
    var inter30=rec.reduce(function(s,p){return s+num(p.interacciones);},0);
    function scoreable(p){ return p.red==="IG" && p.er!=null && num(p.reach)>=20 && ageDays(p)<=120; }
    var cand=posts.filter(scoreable); cand.sort(function(a,b){return b.er-a.er;});
    var best=cand[0];
    var avgER = cand.length? cand.reduce(function(s,p){return s+p.er;},0)/cand.length : 0;
    var avgReach = cand.length? cand.reduce(function(s,p){return s+num(p.reach);},0)/cand.length : 0;
    window.__PUB={ byId:{}, avgER:avgER, avgReach:avgReach, bestId: best?best.id:null };
    posts.forEach(function(p){ window.__PUB.byId[p.id]=p; });
    /* aprendizaje por formato (nombres humanos) -> señal temprana con n */
    var fmts={}; posts.filter(scoreable).forEach(function(p){ var k=formatoFam(p.tipo); (fmts[k]=fmts[k]||[]).push(p.er); });
    var fl=Object.keys(fmts).map(function(k){var a=fmts[k];return {k:k,avg:a.reduce(function(s,x){return s+x;},0)/a.length,n:a.length};});
    fl.sort(function(a,b){return b.avg-a.avg;});
    /* ángulo que más intención genera */
    var bi=igRec.slice().sort(function(a,b){return intenc(b)-intenc(a);})[0];
    var bAng = (bi && intenc(bi)>0) ? anguloDe(bi) : null;
    /* ---- A) franja de DECISIÓN ---- */
    if(fl.length){ var top=fl[0], second=fl[1];
      var chico = top.n<5 || (second&&second.n<5);
      h+='<div class="decision"><div class="dl">Qué publicar esta semana</div><div class="dm">Apuesta por un <b>'+esc(top.k)+'</b>'+
        (bAng?' con el ángulo <b>'+esc(bAng)+'</b>':'')+'. '+
        (chico?'<span style="color:var(--piedra)">Señal temprana: '+top.avg.toFixed(1)+'% engagement en '+top.n+' post'+(top.n>1?'s':'')+(second?' vs '+second.avg.toFixed(1)+'% ('+esc(second.k)+', '+second.n+')':'')+' — confírmalo con 2–3 más.</span>':'Promedia '+top.avg.toFixed(1)+'% de engagement.')+
        '</div></div>';
    }
    /* ---- hueco del LEAD (lo que de verdad importa) ---- */
    h+='<div class="leadgap"><span class="li">⚠️</span><span class="lt"><b>Aún no mides lo único que paga: los clics al Plan de Potencial.</b> Hoy juzgas posts por likes y alcance, no por leads. Con enlaces <b>UTM</b> (~15 min de montaje) cada publicación mostraría cuántos formularios trajo, y aparecería esa columna aquí.</span></div>';
    /* ---- KPIs de cuenta (referencia, de-enfatizados) ---- */
    h+='<div class="kref"><span class="kt">Cuenta · 30 días</span>'+
       '<span>Alcance IG <b>'+fmtN(reach30)+'</b></span><span>Interacciones <b>'+fmtN(inter30)+'</b></span>'+
       '<span>Guardados <b>'+fmtN(saves30)+'</b></span>'+(best?'<span>Mejor ER <b>'+best.er+'%</b></span>':'')+'</div>';
    /* ---- D) controles de orden / filtro ---- */
    function cb(grp,val,lbl){ return '<button class="chipbtn'+(F[grp]===val?' on':'')+'" onclick="pubSet(&#39;'+grp+'&#39;,&#39;'+val+'&#39;)">'+lbl+'</button>'; }
    h+='<div class="pfilters"><span class="pfl">Orden</span>'+cb('orden','reciente','Más reciente')+cb('orden','intencion','Más intención')+cb('orden','alcance','Más alcance')+
       '<span class="pfl" style="margin-left:6px">Red</span>'+cb('red','todas','Todas')+cb('red','IG','Instagram')+cb('red','FB','Facebook')+'</div>';
    /* ---- galería ---- */
    var merged=mergePosts(posts);
    if(F.red!=='todas') merged=merged.filter(function(p){return p.red===F.red;});
    if(F.orden==='intencion') merged.sort(function(a,b){return intenc(b)-intenc(a);});
    else if(F.orden==='alcance') merged.sort(function(a,b){return num(b.reach)-num(a.reach);});
    var total=merged.length, lim=F.verMas?total:Math.min(18,total);
    var vis=merged.slice(0,lim);
    h+='<div class="pgrid">';
    vis.forEach(function(p){
      var nuevo=ageDays(p)<=10?'<span class="pbadge">Nuevo</span>':'';
      var net='<span class="pnet '+(p.red==="IG"?"ig":"fb")+'">'+(p.red==="IG"?"IG":"f")+'</span>';
      var ang=anguloDe(p);
      var main = p.red==="IG"
        ? '<b>'+intenc(p)+'</b> <small>intención</small>'+(p.reach!=null?' &nbsp;<small>'+fmtN(p.reach)+' alc.</small>':'')
        : '<b>'+(p.interacciones||0)+'</b> <small>interac.</small>';
      h+='<div class="pcard" onclick="abrirFicha(&#39;'+p.id+'&#39;)">'+nuevo+net+covHTML(p)+
         '<div class="ph"><div class="pt"><span>'+esc(tipoLabel(p.tipo))+'</span><span>'+esc((p.fecha||"").slice(5))+'</span></div>'+
         '<div class="pmain">'+main+'</div>'+
         '<div class="pfoot">'+(ang?'<span class="pang">'+esc(ang)+'</span>':'<span></span>')+'<span class="pgo">ver →</span></div>'+
         '</div></div>';
    });
    h+='</div>';
    h+='<div class="pcount">Mostrando '+vis.length+' de '+total+' publicaciones.</div>';
    if(lim<total) h+='<span class="pmore" onclick="pubSet(&#39;verMas&#39;,1)">Ver las '+(total-lim)+' restantes</span>';
    else if(total>18) h+='<span class="pmore" onclick="pubSet(&#39;verMas&#39;,0)">Ver menos</span>';
    h+='<p class="hint">«Intención» = guardados + compartidos + visitas al perfil (lo que precede a un lead). FB no da alcance por post (n/d). Datos al '+esc(METRICS.generado||"—")+'.</p>';
    return h;
  }
  /* ---- ficha (modal) con bloques ---- */
  function vOr(x){ return (x==null)?'n/d':fmtN(x); }
  function tileIf(arr,miss,k,val,sub){ if(val==null){ if(miss.indexOf(k)<0) miss.push(k); return; } arr.push('<div class="fm"><div class="fk">'+k+'</div><div class="fv">'+fmtN(val)+'</div>'+(sub?'<div class="fsub">'+sub+'</div>':'')+'</div>'); }
  function block(titulo,tiles){ if(!tiles.length) return ''; return '<div class="fblock">'+titulo+'</div><div class="fmgrid">'+tiles.join('')+'</div>'; }
  function sparkline(serie){
    var vals=(serie||[]).map(function(s){return num(s.reach);});
    if(vals.length<2) return '';
    var mx=Math.max.apply(null,vals), mn=Math.min.apply(null,vals);
    if(mx===mn) return '';
    var w=220,hh=38;
    var pts=vals.map(function(v,i){var x=i/(vals.length-1)*w; var y=hh-((v-mn)/(mx-mn))*(hh-6)-3; return x.toFixed(1)+','+y.toFixed(1);}).join(' ');
    return '<svg class="spark" width="'+w+'" height="'+hh+'" viewBox="0 0 '+w+' '+hh+'"><polyline points="'+pts+'" fill="none" stroke="#b8975a" stroke-width="2"/></svg>';
  }
  function fichaHTML(p,ctx){
    var isIG=p.red==="IG", reel=(/reel|video/i.test(p.tipo||'')||num(p.views)>0);
    var cov = p.cover ? '<img src="'+esc(p.cover)+'" alt="">' : '<div class="pcov-ph">'+esc((p.titulo||"").slice(0,40))+'</div>';
    var net = isIG?"Instagram":"Facebook", ang=anguloDe(p), miss=[];
    var h='<div class="pficha">';
    h+='<div class="pfhead">'+cov+'<div class="pfx"><div class="pftipo">'+esc(net+" · "+tipoLabel(p.tipo)+" · "+p.fecha)+(ageDays(p)<=10?' · <span style="color:#8a6d34">NUEVO</span>':'')+(ang?' · '+esc(ang):'')+'</div>'+
       '<div class="pftit">'+esc(p.titulo||"(sin texto)")+'</div>'+
       (p.permalink?'<a class="link-meta" href="'+esc(p.permalink)+'" target="_blank" rel="noopener">Abrir en '+net+' →</a>':'')+'</div>'+
       '<button class="pfclose" onclick="cerrarFicha()">×</button></div>';
    /* Bloque 1: intención de contacto (lo más cerca del lead) */
    var b1=['<div class="fm gap"><div class="fk">Clics → leads</div><div class="fv">n/d</div><div class="fsub">falta UTM</div></div>'];
    tileIf(b1,miss,"Guardados",p.saves, p.save_rate!=null?(p.save_rate+'% del alcance'):'');
    tileIf(b1,miss,"Compartidos",p.shares,'');
    tileIf(b1,miss,"Visitas al perfil",p.profile_visits,'');
    h+=block('¿Trajo intención de contacto?',b1);
    /* Bloque 2: alcance / gente nueva */
    var b2=[], dR=(isIG&&p.reach!=null&&ctx.avgReach)?Math.round((p.reach-ctx.avgReach)/ctx.avgReach*100):null;
    if(isIG) tileIf(b2,miss,"Alcance",p.reach, dR!=null?('<span style="color:'+(dR>=0?'var(--verde)':'var(--rojo)')+'">'+(dR>=0?'+':'')+dR+'% vs tu media</span>'):'');
    else miss.push("Alcance (FB no lo da)");
    tileIf(b2,miss,"Alcance gente nueva",p.reach_nonfollower,(p.reach_nonfollower!=null&&p.reach)?(Math.round(p.reach_nonfollower/p.reach*100)+'% del alcance'):'');
    if(reel) tileIf(b2,miss,"Reproducciones",p.views, p.watch_avg!=null?(p.watch_avg.toFixed(1)+'s vistos en promedio'):'');
    h+=block('¿Llegó a gente nueva?',b2);
    /* lectura en lenguaje llano */
    if(isIG && p.reach!=null && ctx.avgReach){
      var msg = dR>=10?('✅ Alcance '+dR+'% sobre tu media — el ángulo funcionó, repítelo.')
              : dR<=-10?('Alcance '+Math.abs(dR)+'% bajo tu media — prueba otro gancho o ángulo.')
              : 'Alcance en línea con tu media.';
      h+='<div class="pfrow"><b>Lectura:</b> '+msg+(p.id===ctx.bestId?' · 🏆 tu mejor post':'')+'</div>';
    }
    /* Bloque 3: aplauso / contexto */
    var b3=[]; tileIf(b3,miss,"Me gusta",p.likes,''); tileIf(b3,miss,"Comentarios",p.comments,'');
    tileIf(b3,miss,"Interacciones",p.interacciones,p.er!=null?(p.er+'% ER'):'');
    h+=block('Aplauso / contexto',b3);
    /* crecimiento */
    var sp=sparkline(p.serie);
    if(sp) h+='<div class="pfrow"><b>Crecimiento del alcance</b>'+sp+'</div>';
    /* facebook adjunto */
    if(p._fb){ var f=p._fb; h+='<div class="pfrow">También en <b>Facebook</b>: '+(f.likes||0)+' reacciones · '+(f.comments||0)+' comentarios · '+(f.shares||0)+' compartidos'+(f.clicks!=null?' · '+f.clicks+' clics':'')+'</div>'; }
    /* lo que falta (token nuevo) */
    if(miss.length) h+='<div class="pfrow"><span class="muted">Sin token nuevo: '+esc(miss.join(', '))+'.</span></div>';
    h+='</div>';
    return h;
  }
  if(!window.abrirFicha){
    window.cerrarFicha=function(){ var o=document.getElementById('pov'); if(o&&o.parentNode) o.parentNode.removeChild(o); };
    window.abrirFicha=function(id){
      var ctx=window.__PUB||{byId:{}}; var p=ctx.byId[id]; if(!p) return;
      window.cerrarFicha();
      var o=document.createElement('div'); o.id='pov'; o.className='pov';
      o.addEventListener('click',function(e){ if(e.target===o) window.cerrarFicha(); });
      o.innerHTML=fichaHTML(p,ctx);
      document.body.appendChild(o);
    };
    window.pubSet=function(grp,val){ window.__PUBF=window.__PUBF||{orden:'reciente',red:'todas',verMas:false}; window.__PUBF[grp]=(grp==='verMas')?!!val:val; if(grp!=='verMas') window.__PUBF.verMas=false; if(typeof render==='function') render(); };
    document.addEventListener('keydown',function(e){ if(e.key==='Escape') window.cerrarFicha(); });
  }

  function semaforo(d){
    var k=d.kpis||{}, g=d.gasto||{};
    var gasto=num(g.semana_actual), citas=num(k.citas), leads=num(k.leads);
    if(d.meta&&d.meta.es_snapshot) return {color:"gris",msg:"Esperando datos reales para encender el semáforo."};
    if(gasto>0 && leads===0) return {color:"rojo",msg:"Gastaste "+money(gasto)+" y 0 leads esta semana. Revisa el anuncio o la página."};
    if(gasto>0 && citas===0 && leads>0) return {color:"amar",msg:leads+" leads pero 0 citas. El cuestionario o el seguimiento no están cerrando."};
    if(citas>0){var cc=gasto>0?(" a "+money(gasto/citas)+" c/u"):"";return {color:"verde",msg:citas+" cita"+(citas>1?"s":"")+" agendada"+(citas>1?"s":"")+" esta semana"+cc+". Vas bien."};}
    return {color:"amar",msg:"Sin citas todavía esta semana. Mete tráfico y vigila el embudo."};
  }

  function guardarGasto(){
    var semana=($("gSemana").value||"").trim(), monto=($("gMonto").value||"").trim(),
        camp=($("gCamp").value||"").trim(), clave=($("gClave").value||"").trim();
    if(!semana||!monto){ toast("Pon al menos la semana y el monto",true); return; }
    if(!clave){ toast("Falta la clave de escritura",true); return; }
    CONFIG.WRITE_SECRET=clave; /* usa lo que el usuario teclea */
    var payload={tipo:"gasto", semana:semana, monto:num(monto), campanas:camp};
    var btn=$("gGuardar"); btn.disabled=true; btn.textContent="Guardando…";
    postSheet(payload).then(function(){
      toast("Gasto de "+semana+" guardado ✓"); btn.disabled=false; btn.textContent="Guardar en el Sheet";
      $("gMonto").value="";$("gCamp").value=""; fetchData(false);
    }).catch(function(err){
      /* sin conexión o rechazo: encola y reintenta */
      if(!navigator.onLine){ var q=qload(); q.push(payload); qsave(q); toast("Sin conexión: guardado en cola, se sube al reconectar"); }
      else toast("No se pudo guardar: "+(err&&err.message||"error")+" (¿clave correcta?)",true);
      btn.disabled=false; btn.textContent="Guardar en el Sheet";
    });
  }

  /* ============ ACCESO (clave para VER; seguridad suave, como llave-maestra) ============ */
  var UNLOCK_KEY="aurum_board_unlock_v1";
  function desbloqueado(){ try{return localStorage.getItem(UNLOCK_KEY)===CONFIG.VIEW_KEY;}catch(e){return false;} }
  function renderGate(){
    setBadge("snapshot"); $("periodo").textContent="";
    $("app").innerHTML='<div class="card" style="max-width:380px;margin:48px auto;text-align:center;">'+
      '<p class="h">Board privado · Aurum / YOD</p>'+
      '<p class="s">Escribe la clave para ver el tablero.</p>'+
      '<div class="fld"><input id="gKey" type="password" placeholder="clave" style="text-align:center;"></div>'+
      '<button class="btn" id="gEnter" style="margin-top:12px;width:100%;">Entrar</button></div>';
    function intentar(){ var k=($("gKey").value||"").trim(); if(k===CONFIG.VIEW_KEY){ try{localStorage.setItem(UNLOCK_KEY,k);}catch(e){} iniciar(); } else toast("Clave incorrecta",true); }
    $("gEnter").addEventListener("click",intentar);
    $("gKey").addEventListener("keydown",function(e){ if(e.key==="Enter") intentar(); });
    setTimeout(function(){ var g=$("gKey"); if(g) g.focus(); },120);
  }

  /* ============ ARRANQUE ============ */
  function iniciar(){
    $("badge").addEventListener("click",function(){fetchData(true);});
    document.addEventListener("visibilitychange",function(){if(document.visibilityState==="visible"&&LAST&&Date.now()-LAST>CONFIG.REFRESH_MS)fetchData(false);});
    setInterval(function(){if(document.visibilityState==="visible")fetchData(false);},CONFIG.REFRESH_MS);
    usarCacheOSnap();   /* pinta cache/snapshot al instante */
    fetchData(false);   /* y busca datos en vivo */
    fetchMetrics();     /* y las métricas de publicaciones */
  }
  if(desbloqueado()) iniciar(); else renderGate();
})();
</script>
