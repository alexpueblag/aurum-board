<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Board · Aurum / Yo Desarrollo</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231a1a1a'/%3E%3Crect x='10' y='10' width='80' height='80' fill='none' stroke='%23b8975a' stroke-width='4'/%3E%3Ctext x='50' y='66' font-family='Georgia,serif' font-size='40' fill='%23b8975a' text-anchor='middle'%3EAu%3C/text%3E%3C/svg%3E">
<style>
  :root{--negro:#1a1a1a;--oro:#b8975a;--crema:#faf7f2;--arena:#ece6da;--piedra:#8a7d65;--carbon:#6b6055;--linea:#e0d9cc;
    --verde:#4e7a5a;--amar:#c08a3e;--rojo:#a05252;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--crema);color:var(--negro);font-family:'Helvetica Neue',Arial,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;}
  .serif{font-family:Georgia,serif;}
  header{background:var(--negro);border-bottom:1px solid var(--oro);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:50;}
  .logo{display:flex;align-items:center;gap:11px;}
  .logo-box{width:38px;height:38px;border:1px solid var(--oro);color:var(--oro);display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:15px;flex:none;}
  .logo .nm{color:#f4f1ec;letter-spacing:2px;font-weight:bold;font-size:12px;}
  .logo .sub{color:var(--oro);font-size:10px;letter-spacing:1.5px;}
  .hctrl{display:flex;align-items:center;gap:10px;}
  #badge{display:flex;align-items:center;gap:6px;font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:#cfc6b4;border:1px solid #3a3a3a;border-radius:20px;padding:5px 11px;cursor:pointer;}
  #badge .dot{width:7px;height:7px;border-radius:50%;background:#888;}
  #badge[data-s="live"] .dot{background:var(--verde);} #badge[data-s="live"]{color:#bcd3c2;}
  #badge[data-s="cache"] .dot{background:var(--amar);} #badge[data-s="error"] .dot{background:var(--rojo);}
  #badge[data-s="loading"] .dot{background:var(--oro);animation:pulse 1s infinite;}
  @keyframes pulse{50%{opacity:.3;}}
  main{max-width:1080px;margin:0 auto;padding:22px 18px 90px;}
  h2.sec{font-family:Georgia,serif;font-weight:normal;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--piedra);margin:26px 0 12px;}
  /* semaforo */
  .semaforo{border-radius:6px;padding:18px 22px;color:#fff;margin-bottom:8px;}
  .semaforo.verde{background:var(--verde);} .semaforo.amar{background:var(--amar);} .semaforo.rojo{background:var(--rojo);} .semaforo.gris{background:var(--carbon);}
  .semaforo .lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:.85;}
  .semaforo .msg{font-family:Georgia,serif;font-size:clamp(18px,3vw,24px);margin-top:4px;line-height:1.3;}
  /* numerotes */
  .nums{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
  .num{background:#fff;border:1px solid var(--linea);border-radius:6px;padding:16px 18px;}
  .num .k{font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--piedra);}
  .num .v{font-family:Georgia,serif;font-size:clamp(26px,4vw,34px);color:var(--negro);margin-top:3px;line-height:1.05;}
  .num .v small{font-size:13px;color:var(--piedra);}
  .num .d{font-size:11px;margin-top:3px;} .num .d.up{color:var(--verde);} .num .d.down{color:var(--rojo);} .num .d.flat{color:var(--piedra);}
  .num.star{border-color:var(--oro);box-shadow:0 0 0 1px var(--oro);}
  /* funnel */
  .funnel{display:flex;gap:8px;flex-wrap:wrap;}
  .fstep{flex:1;min-width:120px;background:#fff;border:1px solid var(--linea);border-radius:6px;padding:14px 16px;position:relative;}
  .fstep .fn{font-family:Georgia,serif;font-size:30px;color:var(--oro);}
  .fstep .fl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--piedra);}
  .fstep .fr{font-size:11px;color:var(--carbon);margin-top:2px;}
  /* tablas */
  table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--linea);border-radius:6px;overflow:hidden;font-size:13px;}
  th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--linea);}
  th{font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--piedra);background:var(--arena);}
  td.r,th.r{text-align:right;font-family:Georgia,serif;}
  tr:last-child td{border-bottom:none;}
  /* barras por dia */
  .bars{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .bar{background:#fff;border:1px solid var(--linea);border-radius:5px;padding:8px 4px;text-align:center;}
  .bar .bd{font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:var(--piedra);}
  .bar .bn{font-family:Georgia,serif;font-size:18px;color:var(--negro);margin-top:2px;}
  .bar .bc{font-size:9.5px;color:var(--oro);}
  /* alertas */
  .alert{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--linea);border-left-width:4px;border-radius:5px;padding:10px 14px;margin-bottom:7px;font-size:13px;}
  .alert.verde{border-left-color:var(--verde);} .alert.amar{border-left-color:var(--amar);} .alert.rojo{border-left-color:var(--rojo);}
  .alert .ai{font-size:15px;}
  /* gasto form */
  .card{background:#fff;border:1px solid var(--linea);border-radius:6px;padding:18px;}
  .card p.h{font-family:Georgia,serif;font-size:16px;margin-bottom:4px;}
  .card p.s{font-size:12px;color:var(--piedra);margin-bottom:14px;}
  .frow{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
  .fld{flex:1;min-width:130px;} .fld label{display:block;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--piedra);margin-bottom:4px;}
  .fld input,.fld textarea{width:100%;padding:10px 12px;border:1px solid var(--linea);border-radius:5px;font-size:14px;font-family:inherit;background:var(--crema);}
  .fld textarea{min-height:64px;resize:vertical;}
  .btn{background:var(--oro);color:var(--negro);border:none;border-radius:5px;padding:11px 22px;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;cursor:pointer;}
  .btn:hover{background:#a3854e;} .btn:disabled{opacity:.5;cursor:default;}
  .hint{font-size:11px;color:var(--piedra);margin-top:8px;line-height:1.5;}
  .hint code{background:var(--arena);padding:1px 5px;border-radius:3px;font-size:11px;}
  .nota{font-size:12px;color:var(--piedra);font-style:italic;line-height:1.5;}
  .link-meta{display:inline-block;margin-top:6px;color:var(--oro);font-size:13px;text-decoration:none;border-bottom:1px solid var(--oro);}
  #toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--negro);color:#f4f1ec;padding:12px 20px;border-radius:6px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:90;max-width:90%;}
  #toast.on{opacity:1;} #toast.warn{background:var(--rojo);}
  .muted{color:var(--piedra);font-size:12px;}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-box">Au</div><div><div class="nm">AURUM · YOD</div><div class="sub">BOARD DE MEDICIÓN</div></div></div>
  <div class="hctrl">
    <span class="muted" id="periodo">—</span>
    <div id="badge" data-s="loading" title="Toca para actualizar"><span class="dot"></span><span class="t">Cargando…</span></div>
  </div>
</header>
<main id="app"><p class="muted" style="padding:40px 0;text-align:center;">Cargando board…</p></main>
<div id="toast"></div>

<script>
(function(){
  "use strict";
  /* ============ CONFIG (mismo Apps Script que el cuestionario) ============ */
  var CONFIG = {
    SHEET_URL: "https://script.google.com/macros/s/AKfycbw1Wm5wOC6XE2PcS0xBbIy-OdBbmU5vjvwnVNaHN6Fa7HHugyuk-EvkoURtr56j6dDVag/exec",
    WRITE_SECRET: "aurum-board-2026",   /* seguridad suave para escribir GASTO (debe igualar el .gs) */
    VIEW_KEY: "aurum2026",              /* clave para VER el board (seguridad suave, como tus otros boards) */
    META_EVENTS_URL: "https://business.facebook.com/events_manager2/list/dataset/1563269895817275/overview",
    FETCH_TIMEOUT: 12000,
    REFRESH_MS: 600000,
    METRICS_URL: "metrics.json"   /* metricas de publicaciones (lo genera pull_metrics.py) */
  };
  var CACHE_KEY="aurum_board_cache_v1", QKEY="aurum_board_q_v1", MCACHE="aurum_metrics_cache_v1";
  var DATA=null, LAST=null, METRICS=null;

  /* ============ SNAPSHOT EMBEBIDO (se ve aunque el .gs aún no esté desplegado) ============
     Mismos campos que devuelve GET ?recurso=board. Se reemplaza por datos en vivo al cargar. */
  var SNAP = {
    meta:{actualizado:null, periodo:"Ejemplo (datos ficticios)", semana:"", es_snapshot:true},
    kpis:{leads:18, citas:4, clientes:1, nuevos_sin_tocar_24h:2},
    prev:{leads:12, citas:2, clientes:1},
    gasto:{semana_actual:6000, total:22000, por_campana:[{campana:"Casa Mona",monto:3500},{campana:"Carrusel Terreno",monto:2500}]},
    funnel:[{etapa:"Leads",n:47},{etapa:"Citas",n:11},{etapa:"Clientes",n:3}],
    por_estado:[{estado:"NUEVO",n:28},{estado:"SESIÓN AGENDADA",n:11},{estado:"CLIENTE",n:3},{estado:"DESCARTADO",n:5}],
    por_fuente:[{fuente:"meta",leads:31,citas:8},{fuente:"(directo)",leads:12,citas:2},{fuente:"instagram",leads:4,citas:1}],
    por_dia:[{dia:"lunes",leads:9,citas:3},{dia:"martes",leads:6,citas:1},{dia:"miércoles",leads:8,citas:2},{dia:"jueves",leads:5,citas:1},{dia:"viernes",leads:7,citas:2},{dia:"sábado",leads:8,citas:2},{dia:"domingo",leads:4,citas:0}],
    embudo_cuestionario:{visitas:240, pasos:[{paso:"p0",etiqueta:"Inicio",n:240},{paso:"p1",etiqueta:"Estilo",n:188},{paso:"p2",etiqueta:"Sensación",n:150},{paso:"p3",etiqueta:"Momentos",n:128},{paso:"p4",etiqueta:"Carácter",n:104},{paso:"p5",etiqueta:"Esencial",n:79},{paso:"p6",etiqueta:"Sueños",n:61},{paso:"p7",etiqueta:"Formulario",n:47},{paso:"p8",etiqueta:"Cierre",n:18},{paso:"lead",etiqueta:"Dejó datos",n:18},{paso:"agenda",etiqueta:"Agendó",n:5}], ab:{A:{visita:120,lead:8,agenda:2},B:{visita:120,lead:11,agenda:4}}, canal:{whatsapp:3,calendario:2}},
    alertas:[{tipo:"amar",texto:"Esto es un EJEMPLO. El board cobra vida cuando el Apps Script sirva recurso=board y entre tráfico real."}],
    recientes:[]
  };

  /* ============ HELPERS ============ */
  function $(id){return document.getElementById(id);}
  function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
  function num(v){var n=parseFloat(String(v==null?0:v).replace(/[^0-9.\-]/g,""));return isNaN(n)?0:n;}
  function money(n){return "$"+Math.round(num(n)).toLocaleString("es-MX");}
  function pct(a,b){b=num(b);return b>0?Math.round(num(a)/b*100):0;}
  /* codificacion densa en celda (TU convencion): "campaña::monto" por linea -> [{campana,monto}] */
  function parsePares(txt){return String(txt||"").split("\n").map(function(l){l=l.trim();if(!l)return null;var p=l.split("::");return {a:(p[0]||"").trim(), b:(p[1]||"").trim()};}).filter(Boolean);}
  function flechaHTML(act,prev){
    act=num(act);prev=num(prev);
    if(!prev) return '<span class="d flat">— sin comparativo</span>';
    var dif=act-prev, p=Math.round(dif/prev*100);
    if(dif>0) return '<span class="d up">▲ '+p+'% vs. anterior</span>';
    if(dif<0) return '<span class="d down">▼ '+Math.abs(p)+'% vs. anterior</span>';
    return '<span class="d flat">= igual</span>';
  }

  /* ============ BADGE / FETCH (offline-first, igual que llave-maestra) ============ */
  function setBadge(s){
    var b=$("badge"); if(!b) return;
    var labels={live:"En vivo",cache:"Cache local",error:"Sin conexión",loading:"Actualizando…",snapshot:"Ejemplo"};
    b.setAttribute("data-s",s); b.querySelector(".t").textContent=labels[s]||s;
  }
  function fetchData(manual){
    setBadge("loading");
    var url=CONFIG.SHEET_URL+(CONFIG.SHEET_URL.indexOf("?")<0?"?":"&")+"recurso=board&cb="+Date.now();
    var ctrl=new AbortController(), t=setTimeout(function(){ctrl.abort();},CONFIG.FETCH_TIMEOUT);
    fetch(url,{signal:ctrl.signal}).then(function(r){return r.json();}).then(function(j){
      clearTimeout(t);
      if(j && j.kpis){
        DATA=j; LAST=Date.now();
        try{localStorage.setItem(CACHE_KEY,JSON.stringify(j));}catch(e){}
        render(); setBadge("live");
        if(manual) toast("Board actualizado");
      } else { usarCacheOSnap(); }   /* gs aún sin recurso=board → snapshot/cache (no es "sin conexión") */
    }).catch(function(e){
      clearTimeout(t); usarCacheOSnap();
    });
  }
  function usarCacheOSnap(){
    var c=null; try{c=JSON.parse(localStorage.getItem(CACHE_KEY));}catch(e){}
    if(c && c.kpis){ DATA=c; render(); setBadge("cache"); }
    else if(!DATA){ DATA=SNAP; render(); setBadge("snapshot"); }
  }
  /* --- metricas de publicaciones (archivo del propio board, mismo origen) --- */
  function fetchMetrics(){
    var url=CONFIG.METRICS_URL+(CONFIG.METRICS_URL.indexOf("?")<0?"?":"&")+"cb="+Date.now();
    fetch(url).then(function(r){return r.json();}).then(function(j){
      if(j && j.posts){ METRICS=j; try{localStorage.setItem(MCACHE,JSON.stringify(j));}catch(e){} if(DATA) render(); }
    }).catch(function(){
      try{var c=JSON.parse(localStorage.getItem(MCACHE)); if(c&&c.posts&&!METRICS){METRICS=c; if(DATA) render();}}catch(e){}
    });
  }

  /* ============ ESCRITURA (POST GASTO con cola offline, igual que tu patrón) ============ */
  function postSheet(payload){
    payload.secret=CONFIG.WRITE_SECRET;
    var ctrl=new AbortController(), t=setTimeout(function(){ctrl.abort();},CONFIG.FETCH_TIMEOUT);
    return fetch(CONFIG.SHEET_URL,{method:"POST",body:JSON.stringify(payload),signal:ctrl.signal})
      .then(function(r){clearTimeout(t);return r.json();})
      .then(function(j){if(j&&j.ok)return j;throw new Error((j&&j.error)||"rechazado");});
  }
  function qload(){try{return JSON.parse(localStorage.getItem(QKEY))||[];}catch(e){return [];}}
  function qsave(q){try{localStorage.setItem(QKEY,JSON.stringify(q));}catch(e){}}
  function flushQueue(){
    var q=qload(); if(!q.length) return;
    postSheet(Object.assign({},q[0])).then(function(){var q2=qload();q2.shift();qsave(q2);if(q2.length)flushQueue();else toast("Gasto sincronizado con el Sheet");}).catch(function(){});
  }
  window.addEventListener("online",flushQueue); setInterval(flushQueue,45000); setTimeout(flushQueue,3000);

  var TT=null;
  function toast(msg,warn){var el=$("toast");el.className=warn?"warn":"";el.textContent=msg;el.classList.add("on");clearTimeout(TT);TT=setTimeout(function(){el.classList.remove("on");},3200);}

  /* ============ RENDER ============ */
  function render(){
    var d=DATA||SNAP, k=d.kpis||{}, g=d.gasto||{};
    $("periodo").textContent=(d.meta&&d.meta.periodo)||"";
    var costoCita = num(k.citas)>0 ? money(num(g.semana_actual)/num(k.citas)) : "—";
    /* --- semaforo --- */
    var sem=semaforo(d), html="";
    html+='<div class="semaforo '+sem.color+'"><div class="lbl">Esta semana</div><div class="msg">'+esc(sem.msg)+'</div></div>';
    if(d.meta&&d.meta.es_snapshot) html+='<p class="nota" style="margin-bottom:10px;">Mostrando ejemplo: el board cobra vida cuando el Apps Script sirva <code>recurso=board</code> y entre tráfico.</p>';

    /* --- numerotes --- */
    html+='<h2 class="sec">Resumen del dueño</h2><div class="nums">';
    html+=numHTML("Gasto Meta (semana)", money(g.semana_actual), "", false);
    html+=numHTML("Leads", k.leads, flechaHTML(k.leads,(d.prev||{}).leads), false);
    html+=numHTML("Citas agendadas", k.citas, flechaHTML(k.citas,(d.prev||{}).citas), true);
    html+=numHTML("Costo por cita", costoCita, "", true);
    html+=numHTML("Clientes", k.clientes, flechaHTML(k.clientes,(d.prev||{}).clientes), false);
    html+='</div>';

    /* --- embudo de negocio --- */
    html+='<h2 class="sec">Embudo de negocio (del CRM)</h2><div class="funnel">';
    (d.funnel||[]).forEach(function(f,i){
      var base=(d.funnel[0]||{}).n||0;
      html+='<div class="fstep"><div class="fn">'+esc(f.n)+'</div><div class="fl">'+esc(f.etapa)+'</div>'+
        (i>0?'<div class="fr">'+pct(f.n,base)+'% de los leads</div>':'<div class="fr">base</div>')+'</div>';
    });
    html+='</div>';
    /* --- embudo del cuestionario (9 pantallas) leído del Sheet/ACTIVIDAD --- */
    var ec=d.embudo_cuestionario;
    if(ec && ec.pasos && ec.pasos.length){
      var base0=(ec.pasos[0]||{}).n||0;
      var mc={i:-1,d:0}, pv=base0;
      ec.pasos.forEach(function(p,i){ var c=(i>0&&pv>0)?Math.round((pv-p.n)/pv*100):0; if(c>mc.d){mc={i:i,d:c};} pv=p.n; });
      html+='<h2 class="sec">Embudo del cuestionario · '+esc(ec.visitas||base0)+' visitas (del Sheet)</h2>';
      pv=base0;
      ec.pasos.forEach(function(p,i){
        var w=base0>0?Math.round(p.n/base0*100):0;
        var c=(i>0&&pv>0)?Math.round((pv-p.n)/pv*100):0;
        var rojo=(i===mc.i&&mc.d>0);
        html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">'+
          '<div style="width:92px;font-size:11px;color:var(--carbon);text-align:right;flex:none;">'+esc(p.etiqueta)+'</div>'+
          '<div style="flex:1;height:20px;background:var(--arena);border-radius:4px;overflow:hidden;"><div style="height:100%;width:'+Math.max(w,2)+'%;background:'+(rojo?"var(--rojo)":"var(--oro)")+';"></div></div>'+
          '<div style="width:128px;font-family:Georgia,serif;font-size:14px;flex:none;">'+esc(p.n)+' <small style="color:var(--piedra);font-size:11px;">'+w+'%</small>'+(i>0&&c>0?' <span style="color:'+(rojo?"var(--rojo)":"var(--piedra)")+';font-size:11px;">−'+c+'%</span>':'')+'</div>'+
        '</div>';
        pv=p.n;
      });
      html+='<p class="nota" style="margin-top:8px;">De TU Sheet (pestaña <code style="background:var(--arena);padding:1px 5px;border-radius:3px;">ACTIVIDAD</code>). El mayor escalón en rojo es la pantalla a mejorar. <a class="link-meta" href="'+CONFIG.META_EVENTS_URL+'" target="_blank" rel="noopener">Ver también en Meta →</a></p>';
    } else {
      html+='<p class="nota" style="margin-top:10px;">El embudo de las <b>9 pantallas</b> aparece cuando el Apps Script registre actividad (pestaña ACTIVIDAD). Mientras, <a class="link-meta" href="'+CONFIG.META_EVENTS_URL+'" target="_blank" rel="noopener">en Meta →</a></p>';
    }

    /* --- canal de agenda (whatsapp vs calendario) — el A/B de portada se retiró (portada única) --- */
    var can=ec&&ec.canal;
    if(can && (num(can.whatsapp)||num(can.calendario))){
      var tc=num(can.whatsapp)+num(can.calendario);
      html+='<h2 class="sec">Canal de agenda</h2><div class="funnel">';
      html+='<div class="fstep"><div class="fn">'+esc(can.whatsapp)+'</div><div class="fl">WhatsApp</div><div class="fr">'+pct(can.whatsapp,tc)+'%</div></div>';
      html+='<div class="fstep"><div class="fn">'+esc(can.calendario)+'</div><div class="fl">Calendario</div><div class="fr">'+pct(can.calendario,tc)+'%</div></div>';
      html+='</div>';
    }

    /* --- por fuente --- */
    if((d.por_fuente||[]).length){
      html+='<h2 class="sec">Por fuente / campaña</h2><table><tr><th>Fuente</th><th class="r">Leads</th><th class="r">Citas</th><th class="r">% a cita</th></tr>';
      d.por_fuente.forEach(function(f){html+='<tr><td>'+esc(f.fuente||"(directo)")+'</td><td class="r">'+esc(f.leads)+'</td><td class="r">'+esc(f.citas||0)+'</td><td class="r">'+pct(f.citas,f.leads)+'%</td></tr>';});
      html+='</table><p class="hint">Se llena cuando los anuncios traigan la plantilla de UTMs. Hoy "(directo)" = sin etiqueta.</p>';
    }

    /* --- por dia --- */
    if((d.por_dia||[]).length){
      html+='<h2 class="sec">Por día de la semana</h2><div class="bars">';
      ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"].forEach(function(dia){
        var row=(d.por_dia||[]).filter(function(x){return (x.dia||"").toLowerCase().indexOf(dia.toLowerCase().slice(0,3))===0;})[0]||{};
        html+='<div class="bar"><div class="bd">'+dia+'</div><div class="bn">'+(row.leads||0)+'</div><div class="bc">'+(row.citas||0)+' citas</div></div>';
      });
      html+='</div>';
    }

    /* --- publicaciones (redes) --- */
    html+=pubSection();

    /* --- alertas --- */
    if((d.alertas||[]).length){
      html+='<h2 class="sec">Algo que revisar</h2>';
      d.alertas.forEach(function(a){var ic=a.tipo==="rojo"?"⛔":a.tipo==="verde"?"✅":"⚠️";html+='<div class="alert '+(a.tipo||"amar")+'"><span class="ai">'+ic+'</span><span>'+esc(a.texto)+'</span></div>';});
    }

    /* --- gasto manual (codificacion densa en celda) --- */
    html+='<h2 class="sec">Registrar gasto de la semana</h2>'+
      '<div class="card"><p class="h">Gasto de pauta — entrada manual</p>'+
      '<p class="s">Una fila por semana. Las campañas van en UNA sola celda (tu convención, para no hacer filas).</p>'+
      '<div class="frow">'+
        '<div class="fld" style="max-width:150px;"><label>Semana</label><input id="gSemana" value="'+esc((d.meta&&d.meta.semana)||"")+'" placeholder="2026-W25"></div>'+
        '<div class="fld" style="max-width:160px;"><label>Gasto total (MXN)</label><input id="gMonto" inputmode="numeric" placeholder="3500"></div>'+
      '</div>'+
      '<div class="frow" style="margin-top:10px;"><div class="fld"><label>Campañas (una por línea: nombre::monto)</label>'+
        '<textarea id="gCamp" placeholder="Casa Mona::1800&#10;Carrusel Terreno::1700"></textarea></div></div>'+
      '<div class="frow" style="margin-top:10px;"><div class="fld" style="max-width:200px;"><label>Clave de escritura</label><input id="gClave" type="password" placeholder="clave del board"></div>'+
        '<button class="btn" id="gGuardar">Guardar en el Sheet</button></div>'+
      '<p class="hint">Se guarda como fila en la pestaña <code>GASTO</code>; las campañas quedan en una celda con tu formato <code>nombre::monto</code> por línea. El costo por cita se recalcula solo.</p>'+
      '</div>';

    $("app").innerHTML=html;
    var gb=$("gGuardar"); if(gb) gb.addEventListener("click",guardarGasto);
  }
  function numHTML(k,v,delta,star){return '<div class="num'+(star?" star":"")+'"><div class="k">'+esc(k)+'</div><div class="v">'+esc(v)+'</div>'+(delta||"")+'</div>';}

  /* ============ PUBLICACIONES (redes) ============ */
  function fmtN(n){ n=num(n); return n>=1000 ? (n/1000).toFixed(n>=10000?0:1)+"k" : String(Math.round(n)); }
  function pubSection(){
    var h='<h2 class="sec">Rendimiento de publicaciones (redes)</h2>';
    if(!METRICS || !(METRICS.posts||[]).length){
      return h+'<p class="nota">Aún sin métricas. Corre <code>pull_metrics.py</code> (saca reach / interacciones / guardados de FB e IG por la Graph API) y sube <code>metrics.json</code> al board.</p>';
    }
    var posts=METRICS.posts.slice(), now=Date.now(), DAY=86400000;
    function ageD(p){ var t=Date.parse((p.fecha||"")+"T12:00:00"); return isNaN(t)?99999:(now-t)/DAY; }
    var rec=posts.filter(function(p){return ageD(p)<=30;});
    var igRec=rec.filter(function(p){return p.red==="IG";});
    var reach30=igRec.reduce(function(s,p){return s+num(p.reach);},0);
    var saves30=igRec.reduce(function(s,p){return s+num(p.saves);},0);
    var inter30=rec.reduce(function(s,p){return s+num(p.interacciones);},0);
    /* solo posts recientes y con muestra suficiente cuentan para ranking/aprendizaje (ER en reach chico es ruido) */
    function scoreable(p){ return p.red==="IG" && p.er!=null && num(p.reach)>=20 && ageD(p)<=120; }
    var cand=posts.filter(scoreable);
    cand.sort(function(a,b){return b.er-a.er;});
    var best=cand[0];
    /* KPIs de contenido */
    h+='<div class="nums">';
    h+=numHTML("Reach IG · 30 días", fmtN(reach30), igRec.length+" publicaciones", false);
    h+=numHTML("Interacciones · 30 días", fmtN(inter30), "", false);
    h+=numHTML("Guardados IG · 30 días", fmtN(saves30), "señal de “me sirve”", true);
    if(best) h+=numHTML("Mejor ER (IG)", best.er+"%", esc((best.titulo||"").slice(0,26)), true);
    h+='</div>';
    /* aprendizaje por formato (qué tipo rinde más) */
    var fmts={};
    posts.filter(scoreable).forEach(function(p){ (fmts[p.tipo]=fmts[p.tipo]||[]).push(p.er); });
    var fl=Object.keys(fmts).map(function(k){var a=fmts[k];return {k:k,avg:a.reduce(function(s,x){return s+x;},0)/a.length,n:a.length};});
    fl.sort(function(a,b){return b.avg-a.avg;});
    if(fl.length){
      var top=fl[0];
      h+='<div class="alert verde"><span class="ai">📈</span><span>Tu formato más fuerte (últimos meses): <b>'+esc(top.k)+'</b> · '+top.avg.toFixed(1)+'% ER promedio en '+top.n+'. '+(fl[1]?'Le sigue '+esc(fl[1].k)+' ('+fl[1].avg.toFixed(1)+'%). Prioriza '+esc(top.k)+'.':'')+(top.n<3?' <i>(muestra chica, tómalo como pista, no ley)</i>':'')+'</span></div>';
    }
    /* tabla de publicaciones (más recientes) */
    h+='<table><tr><th>Red</th><th>Tipo</th><th>Fecha</th><th class="r">Reach</th><th class="r">Inter</th><th class="r">ER%</th><th class="r">Guard</th><th></th></tr>';
    posts.slice(0,15).forEach(function(p){
      var hi=(best && p.id===best.id)?' style="background:#fbf7ee;"':'';
      var link=p.permalink?'<a href="'+esc(p.permalink)+'" target="_blank" rel="noopener" style="color:var(--oro);text-decoration:none;">ver →</a>':'';
      h+='<tr'+hi+'><td>'+esc(p.red)+'</td><td>'+esc(p.tipo)+'</td><td>'+esc(p.fecha)+'</td>'+
         '<td class="r">'+(p.reach==null?'n/d':fmtN(p.reach))+'</td>'+
         '<td class="r">'+(p.interacciones==null?'-':esc(p.interacciones))+'</td>'+
         '<td class="r">'+(p.er==null?'-':esc(p.er))+'</td>'+
         '<td class="r">'+(p.saves==null?'-':esc(p.saves))+'</td>'+
         '<td>'+link+'</td></tr>';
    });
    h+='</table>';
    h+='<p class="hint">FB ya no entrega <i>reach</i> por post en la nueva API de Páginas → ahí va <code>n/d</code> (sí contamos reacciones/comentarios/compartidos). '+
       'Para saber qué post trae <b>leads</b>, usa enlaces con UTM al Plan de Potencial: aparecerán arriba en «Por fuente». '+
       'Datos al '+esc(METRICS.generado||"—")+'.</p>';
    return h;
  }

  function semaforo(d){
    var k=d.kpis||{}, g=d.gasto||{};
    var gasto=num(g.semana_actual), citas=num(k.citas), leads=num(k.leads);
    if(d.meta&&d.meta.es_snapshot) return {color:"gris",msg:"Esperando datos reales para encender el semáforo."};
    if(gasto>0 && leads===0) return {color:"rojo",msg:"Gastaste "+money(gasto)+" y 0 leads esta semana. Revisa el anuncio o la página."};
    if(gasto>0 && citas===0 && leads>0) return {color:"amar",msg:leads+" leads pero 0 citas. El cuestionario o el seguimiento no están cerrando."};
    if(citas>0){var cc=gasto>0?(" a "+money(gasto/citas)+" c/u"):"";return {color:"verde",msg:citas+" cita"+(citas>1?"s":"")+" agendada"+(citas>1?"s":"")+" esta semana"+cc+". Vas bien."};}
    return {color:"amar",msg:"Sin citas todavía esta semana. Mete tráfico y vigila el embudo."};
  }

  function guardarGasto(){
    var semana=($("gSemana").value||"").trim(), monto=($("gMonto").value||"").trim(),
        camp=($("gCamp").value||"").trim(), clave=($("gClave").value||"").trim();
    if(!semana||!monto){ toast("Pon al menos la semana y el monto",true); return; }
    if(!clave){ toast("Falta la clave de escritura",true); return; }
    CONFIG.WRITE_SECRET=clave; /* usa lo que el usuario teclea */
    var payload={tipo:"gasto", semana:semana, monto:num(monto), campanas:camp};
    var btn=$("gGuardar"); btn.disabled=true; btn.textContent="Guardando…";
    postSheet(payload).then(function(){
      toast("Gasto de "+semana+" guardado ✓"); btn.disabled=false; btn.textContent="Guardar en el Sheet";
      $("gMonto").value="";$("gCamp").value=""; fetchData(false);
    }).catch(function(err){
      /* sin conexión o rechazo: encola y reintenta */
      if(!navigator.onLine){ var q=qload(); q.push(payload); qsave(q); toast("Sin conexión: guardado en cola, se sube al reconectar"); }
      else toast("No se pudo guardar: "+(err&&err.message||"error")+" (¿clave correcta?)",true);
      btn.disabled=false; btn.textContent="Guardar en el Sheet";
    });
  }

  /* ============ ACCESO (clave para VER; seguridad suave, como llave-maestra) ============ */
  var UNLOCK_KEY="aurum_board_unlock_v1";
  function desbloqueado(){ try{return localStorage.getItem(UNLOCK_KEY)===CONFIG.VIEW_KEY;}catch(e){return false;} }
  function renderGate(){
    setBadge("snapshot"); $("periodo").textContent="";
    $("app").innerHTML='<div class="card" style="max-width:380px;margin:48px auto;text-align:center;">'+
      '<p class="h">Board privado · Aurum / YOD</p>'+
      '<p class="s">Escribe la clave para ver el tablero.</p>'+
      '<div class="fld"><input id="gKey" type="password" placeholder="clave" style="text-align:center;"></div>'+
      '<button class="btn" id="gEnter" style="margin-top:12px;width:100%;">Entrar</button></div>';
    function intentar(){ var k=($("gKey").value||"").trim(); if(k===CONFIG.VIEW_KEY){ try{localStorage.setItem(UNLOCK_KEY,k);}catch(e){} iniciar(); } else toast("Clave incorrecta",true); }
    $("gEnter").addEventListener("click",intentar);
    $("gKey").addEventListener("keydown",function(e){ if(e.key==="Enter") intentar(); });
    setTimeout(function(){ var g=$("gKey"); if(g) g.focus(); },120);
  }

  /* ============ ARRANQUE ============ */
  function iniciar(){
    $("badge").addEventListener("click",function(){fetchData(true);});
    document.addEventListener("visibilitychange",function(){if(document.visibilityState==="visible"&&LAST&&Date.now()-LAST>CONFIG.REFRESH_MS)fetchData(false);});
    setInterval(function(){if(document.visibilityState==="visible")fetchData(false);},CONFIG.REFRESH_MS);
    usarCacheOSnap();   /* pinta cache/snapshot al instante */
    fetchData(false);   /* y busca datos en vivo */
    fetchMetrics();     /* y las métricas de publicaciones */
  }
  if(desbloqueado()) iniciar(); else renderGate();
})();
</script>
