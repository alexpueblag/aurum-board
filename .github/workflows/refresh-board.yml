name: Refrescar board (metricas FB/IG)

# Corre en la NUBE cada hora — sin depender de que la Mac este prendida ni del WiFi.
# Boton manual "Run workflow" (workflow_dispatch) disparable desde el cel (app de GitHub).
# Antes de que exista el Secret YOD_META_TOKEN, cada corrida es un no-op limpio (verde).
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

# concurrencia: nunca dos corridas escribiendo a la vez
concurrency:
  group: refresh-board
  cancel-in-progress: false

# permiso minimo: solo escribir contenido (commitear metrics.json + covers/)
permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.3.0
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r scripts/requirements.txt

      - name: Hay token?
        id: tok
        env:
          YOD_META_TOKEN: ${{ secrets.YOD_META_TOKEN }}
        run: |
          if [ -n "$YOD_META_TOKEN" ]; then
            echo "hay=si" >> "$GITHUB_OUTPUT"
          else
            echo "hay=no" >> "$GITHUB_OUTPUT"
            echo "::notice::Sin Secret YOD_META_TOKEN todavia; corrida no-op (agrega el token para activar)."
          fi

      - name: Jalar metricas de FB/IG
        if: steps.tok.outputs.hay == 'si'
        env:
          YOD_META_TOKEN: ${{ secrets.YOD_META_TOKEN }}
        run: python scripts/pull_metrics.py

      - name: Publicar si cambio
        if: steps.tok.outputs.hay == 'si'
        run: |
          git config user.name "yod-board-bot"
          git config user.email "actions@users.noreply.github.com"
          git add metrics.json covers
          if git diff --cached --quiet; then
            echo "Sin cambios que subir."
          else
            git commit -m "Actualizar metricas (Action $(date -u +%Y-%m-%dT%H:%MZ)) [skip ci]"
            git push
          fi
